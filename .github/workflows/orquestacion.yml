        run: |
          echo "[*] Iniciando: Unificación"
          gh workflow run "unificacion.yml" --ref main

          # Esperar a que aparezca el run
          sleep 5

          # Obtener el ID del último run
          RUN_ID=$(gh run list --workflow unificacion.yml --limit 1 --json databaseId -q '.[0].databaseId')
          echo "[*] Run ID: $RUN_ID"

