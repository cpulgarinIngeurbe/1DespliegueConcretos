      - name: "7️⃣ Ejecutar: Generar Dashboard"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "[*] Iniciando: Generar Dashboard"
          gh workflow run "generarDashboard.yml" --ref main

          # Esperar a que aparezca el run
          sleep 5

          # Obtener el ID del último run
          RUN_ID=$(gh run list --workflow generarDashboard.yml --limit 1 --json databaseId -q '.[0].databaseId')
