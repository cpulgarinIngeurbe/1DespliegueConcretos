name: 🔄 Orquestación Completa

on:
  schedule:
    # 7:00 am COT = 12:00 UTC
    - cron: '0 12 * * *'
    # 9:00 am COT = 14:00 UTC
    - cron: '0 14 * * *'
    # 11:00 am COT = 16:00 UTC
    - cron: '0 16 * * *'
    # 1:00 pm COT = 18:00 UTC
    - cron: '0 18 * * *'
    # 3:00 pm COT = 20:00 UTC
    - cron: '0 20 * * *'
    # 5:00 pm COT = 22:00 UTC
    - cron: '0 22 * * *'
    # 7:00 pm COT = 00:00 UTC (medianoche)
    - cron: '0 0 * * *'
    # 9:00 pm COT = 02:00 UTC (madrugada)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  orquestacion:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 📋 Información del run
        run: |
          echo "=== ORQUESTACIÓN INICIADA ==="
          echo "Fecha y hora UTC: $(date -u)"
          echo "Timezone: UTC"
          echo ""
          echo "Horarios programados (Bogotá COT):"
          echo "  - 7:00 am"
          echo "  - 9:00 am"
          echo "  - 11:00 am"
          echo "  - 1:00 pm"
          echo "  - 3:00 pm"
          echo "  - 5:00 pm"
          echo "  - 7:00 pm"
          echo "  - 9:00 pm"

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: "1️⃣ Ejecutar: Descarga Diaria Concrelab"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "[*] Iniciando: Descarga Diaria Concrelab"
          gh workflow run "descarga-concrelab.yml" --ref main

          # Esperar a que aparezca el run
          sleep 5

          # Obtener el ID del último run
          RUN_ID=$(gh run list --workflow descarga-concrelab.yml --limit 1 --json databaseId -q '.[0].databaseId')
          echo "[*] Run ID: $RUN_ID"

          # Esperar a que el workflow termine
          MAX_ATTEMPTS=360
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(gh run view $RUN_ID --json status -q '.status')
            CONCLUSION=$(gh run view $RUN_ID --json conclusion -q '.conclusion')

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "[+] ✓ Descarga Diaria Concrelab completada exitosamente"
                break
              else
                echo "[!] ✗ Descarga Diaria Concrelab falló con conclusión: $CONCLUSION"
                exit 1
              fi
            fi

            if [ $((ATTEMPT % 20)) -eq 0 ]; then
              echo "[*] Esperando... Estado: $STATUS (intento $ATTEMPT/$MAX_ATTEMPTS)"
            fi

            sleep 3
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "[!] ✗ Timeout: Descarga Diaria Concrelab no completó en tiempo"
            exit 1
          fi

      - name: "2️⃣ Ejecutar: Descarga Piazza Concrelab"
