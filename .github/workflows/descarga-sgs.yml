name: 📊 Descarga Diaria SGS

on:
  workflow_dispatch:

jobs:
  descargar-sgs:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install playwright pandas openpyxl
          playwright install chromium

      - name: 🗑️ Limpiar archivos SGS anteriores
        run: |
          mkdir -p datos/
          rm -f datos/reporte_sgs_*.xlsx
          echo "[*] Archivos SGS limpios"

      - name: ⬇️ Ejecutar descarga SGS (NATIVA y VIALE)
        env:
          SGS_NATIVA_USER: ${{ secrets.SGS_NATIVA_USER }}
          SGS_NATIVA_PASS: ${{ secrets.SGS_NATIVA_PASS }}
          SGS_VIALE_USER: ${{ secrets.SGS_VIALE_USER }}
          SGS_VIALE_PASS: ${{ secrets.SGS_VIALE_PASS }}
        run: python bot_sgs.py

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 📤 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add datos/

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Descarga SGS - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "[+] ✅ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== RESULTADO FINAL ==="
          echo "Archivos en datos/:"
          ls -lh datos/ 2>/dev/null || echo "No hay archivos aún"
          echo ""
          echo "Últimos commits:"
          git log --oneline -3
