name: 📊 Descarga Diaria SGS

on:
  workflow_dispatch:

jobs:
  descargar-sgs:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: 🗑️ Limpiar carpeta de datos
        run: |
          rm -rf datos/
          mkdir -p datos/
          echo "[*] Carpeta datos limpiada"

      - name: ⬇️ Descargar SGS (NATIVA y VIALE)
        env:
          SGS_NATIVA_USER: ${{ secrets.SGS_NATIVA_USER }}
          SGS_NATIVA_PASS: ${{ secrets.SGS_NATIVA_PASS }}
          SGS_VIALE_USER: ${{ secrets.SGS_VIALE_USER }}
          SGS_VIALE_PASS: ${{ secrets.SGS_VIALE_PASS }}
        run: |
          python << 'EOF'
          from playwright.sync_api import sync_playwright
          import os
          from pathlib import Path
          from datetime import datetime

          # Lista de proyectos
          proyectos = ['NATIVA', 'VIALE']
          url_login = "https://qclient.sgs.com/authentication?redirectURL=%2Fhome"

          print('[*] Iniciando descarga SGS - Múltiples proyectos')
          print(f'[*] Proyectos a descargar: {", ".join(proyectos)}')

          # Crear carpeta datos si no existe
          Path('datos').mkdir(exist_ok=True)

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)

              # Iterar sobre cada proyecto
              for proyecto in proyectos:
                  print(f'\n[*] ========== DESCARGANDO: {proyecto} ==========')

                  email = os.getenv(f'SGS_{proyecto}_USER')
                  password = os.getenv(f'SGS_{proyecto}_PASS')

                  if not email or not password:
                      print(f'[!] ERROR: Credenciales no encontradas para {proyecto}')
                      continue

                  context = browser.new_context(accept_downloads=True)
                  page = context.new_page()

                  try:
                      page.goto(url_login, timeout=60000)
                      print(f'[+] Login SGS - {proyecto}')
                      page.fill("input[id='user']", email)
                      page.fill("input[id='password']", password)
                      page.get_by_role("button", name="Ingresar").click()
                      page.wait_for_selector("text=Reportes", timeout=60000)
                      print(f'[+] ✅ Login exitoso - {proyecto}')

                      page.click("text=Reportes")
                      page.wait_for_selector("text=Generación de reportes", timeout=30000)
                      print(f'[+] ✅ En Reportes - {proyecto}')

                      page.click("text=Generación de reportes")
                      page.wait_for_selector("a.btn.btn-primary.icon-format-list-checks", timeout=30000)
                      print(f'[+] ✅ En Generación de reportes - {proyecto}')

                      page.click("a.btn.btn-primary.icon-format-list-checks")
                      page.wait_for_timeout(3000)
                      page.keyboard.press("Escape")

                      page.wait_for_selector("mat-form-field:has-text('Tip de Reporte')", timeout=30000)
                      page.click("mat-form-field:has-text('Tip de Reporte') div.mat-mdc-select-trigger")
                      page.wait_for_timeout(500)

                      # Tipo Reporte
                      for _ in range(3):
                          page.keyboard.press("ArrowDown")
                      page.keyboard.press("Enter")
                      page.wait_for_timeout(2000)
                      print(f'[+] ✅ Tipo Reporte seleccionado - {proyecto}')

                      # Código de Obra
                      page.click("mat-form-field:has-text('Código de Obra') div.mat-mdc-select-trigger")
                      page.wait_for_timeout(1000)
                      page.keyboard.press("ArrowDown")
                      page.keyboard.press("Enter")
                      page.wait_for_timeout(1000)
                      print(f'[+] ✅ Código de Obra seleccionado - {proyecto}')

                      # Esperar a que la página se estabilice completamente
                      page.wait_for_load_state('networkidle', timeout=30000)
                      page.wait_for_timeout(3000)

                      # Esperar explícitamente a que el spinner desaparezca
                      for intento_spinner in range(1, 6):
                          spinner_hidden = page.is_hidden("div.ngx-spinner-overlay")
                          if spinner_hidden:
                              print(f'[+] Spinner desaparecido - {proyecto}')
                              break
                          if intento_spinner < 5:
                              print(f'[*] Esperando spinner intento {intento_spinner}... - {proyecto}')
                              page.wait_for_timeout(2000)
                          else:
                              print(f'[!] Spinner sigue visible, continuando - {proyecto}')

                      # Tipo Material - con reintentos
                      for intento_material in range(1, 4):
                          try:
                              page.click("mat-form-field:has-text('Tipo Material') div.mat-mdc-select-trigger", timeout=20000)
                              page.wait_for_timeout(1000)
                              page.keyboard.press("ArrowDown")
                              page.keyboard.press("ArrowUp")
                              page.keyboard.press("Enter")
                              page.wait_for_timeout(1000)
                              print(f'[+] ✅ Tipo Material seleccionado - {proyecto}')
                              break
                          except Exception as e:
                              if intento_material < 3:
                                  print(f'[!] Intento {intento_material} fallió - {proyecto}')
                                  page.wait_for_timeout(3000)
                              else:
                                  print(f'[!] Error: {str(e)}')
                                  raise

                      # Esperar nuevamente a que la página se estabilice
                      page.wait_for_load_state('networkidle', timeout=30000)
                      page.wait_for_timeout(2000)

                      # Cerrar cualquier modal o dropdown abierto
                      for _ in range(3):
                          page.keyboard.press("Escape")
                          page.wait_for_timeout(500)
                      print(f'[+] Cerrados modales abiertos - {proyecto}')

                      # Esperar a que el backdrop desaparezca
                      try:
                          page.wait_for_selector("div.cdk-overlay-backdrop", state="hidden", timeout=15000)
                          print(f'[+] Backdrop desaparecido - {proyecto}')
                      except:
                          print(f'[*] Backdrop no encontrado o ya oculto - {proyecto}')
                          pass

                      page.wait_for_timeout(2000)

                      # Aplicar filtro - con reintentos
                      for intento_filtro in range(1, 4):
                          try:
                              page.wait_for_selector("i.icon-filter-outline", timeout=15000)
                              page.locator("i.icon-filter-outline").click(timeout=20000)
                              page.wait_for_timeout(2000)
                              print(f'[+] ✅ Filtro aplicado - {proyecto}')
                              break
                          except Exception as e:
                              if intento_filtro < 3:
                                  print(f'[!] Intento {intento_filtro} falló - {proyecto}')
                                  page.keyboard.press("Escape")
                                  page.wait_for_timeout(2000)
                              else:
                                  print(f'[!] Error aplicando filtro: {str(e)}')
                                  raise

                      # Marcar checkbox
                      page.wait_for_selector("#mat-mdc-checkbox-1-input", timeout=30000)
                      page.check("#mat-mdc-checkbox-1-input")
                      page.wait_for_timeout(2000)
                      print(f'[+] ✅ Checkbox marcado - {proyecto}')

                      # Descargar Excel - CON REINTENTOS
                      page.wait_for_selector("button:has(i.icon-file-excel)", timeout=60000)
                      print(f'[DESCARGA] Botón encontrado, iniciando descarga para {proyecto}...')

                      for intento in range(1, 4):
                          try:
                              with page.expect_download(timeout=60000) as download_info:
                                  page.locator("button:has(i.icon-file-excel)").click()

                              page.wait_for_timeout(3000)

                              download = download_info.value
                              filepath = f'datos/reporte_sgs_{proyecto}.xlsx'
                              download.save_as(filepath)
                              print(f'[+] ✅ Descargado: {filepath}')
                              break
                          except Exception as e:
                              if intento < 3:
                                  print(f'[!] Intento {intento} falló, reintentando...')
                                  page.wait_for_timeout(2000 * intento)
                              else:
                                  print(f'[!] Error después de 3 intentos')
                                  raise

                  except Exception as e:
                      print(f'[!] ERROR en {proyecto}: {str(e)}')
                  finally:
                      context.close()

              browser.close()
              print('\n[+] ✅ Descarga SGS completada para todos los proyectos')

          EOF

      - name: 📦 Instalar pandas y openpyxl
        run: |
          pip install pandas openpyxl

      - name: 📈 Transformar y Formatear SGS
        run: |
          python << 'EOF'
          import pandas as pd
          import os
          from openpyxl import load_workbook
          from openpyxl.styles import PatternFill, Font

          ruta_datos = "datos"

          # Obtener archivos SGS
          archivos_sgs = [f for f in os.listdir(ruta_datos) if f.startswith('reporte_sgs_') and f.endswith('.xlsx')]
          print(f'[*] Transformando {len(archivos_sgs)} archivo(s) SGS')

          for archivo in archivos_sgs:
              ruta_origen = os.path.join(ruta_datos, archivo)
              print(f'\n[*] Procesando: {archivo}')

              # Cargar Excel
              df = pd.read_excel(ruta_origen)
              print(f'[+] Datos cargados. Forma: {df.shape}')

              # Mapeo de renombramiento (de nombres técnicos a legibles)
              mapeo_campos = {
                  'codigoObra': 'Proyecto',
                  'asentamiento': 'Cilindro Nº',
                  'codigoMezcla': 'Código de mezcla',
                  'localizacion': 'Localización',
                  'fechaMuestreo': 'Toma',
                  'fechaRotura': 'Rotura',
                  'edad': 'Edad (días)',
                  'Resistencia Nominal Mpa': 'Resistencia nominal (MPa)',
                  'Resistencia Mpa': 'Resistencia (MPa)',
                  'porcentaje': 'Resistencia (%)'
              }

              df = df.rename(columns=mapeo_campos)
              print(f'[+] Columnas renombradas')

              # Mantener solo columnas requeridas
              columnas_mantener = [
                  'Proyecto',
                  'Cilindro Nº',
                  'Código de mezcla',
                  'Localización',
                  'Toma',
                  'Rotura',
                  'Edad (días)',
                  'Resistencia nominal (MPa)',
                  'Resistencia (MPa)',
                  'Resistencia (%)'
              ]

              df = df[[col for col in columnas_mantener if col in df.columns]]
              print(f'[+] Columnas filtradas')

              # Agregar columna TIPO según Localización
              def obtener_tipo(localizacion):
                  if pd.isna(localizacion):
                      return None
                  localizacion_upper = str(localizacion).upper()
                  if "MURO" in localizacion_upper:
                      return "MURO"
                  elif "PLACA" in localizacion_upper:
                      return "PLACA"
                  elif "AUTOCOMPACTABLE" in localizacion_upper:
                      return "AUTOCOMPACTABLE"
                  elif "TREMIE" in localizacion_upper:
                      return "TREMIE"
                  return None

              df['TIPO'] = df['Localización'].apply(obtener_tipo)
              print(f'[+] Columna TIPO agregada')

              # Calcular promedio por grupo (con Localización)
              df['Resistencia Promedio (MPa)'] = df.groupby(['Proyecto', 'Localización', 'Cilindro Nº', 'Edad (días)'])['Resistencia (MPa)'].transform('mean')

              # Calcular conteo
              df['Conteo Elementos'] = df.groupby(['Proyecto', 'Localización', 'Cilindro Nº', 'Edad (días)'])['Resistencia (MPa)'].transform('count')

              # Renombrar y calcular porcentaje individual
              df = df.rename(columns={'Resistencia (MPa)': 'Resistencia (MPa) Individual'})
              df['Resistencia (%) Individual'] = (df['Resistencia (MPa) Individual'] / df['Resistencia nominal (MPa)']) * 100

              # Redondear a 3 decimales
              columnas_numericas = ['Edad (días)', 'Resistencia nominal (MPa)', 'Resistencia (MPa) Individual', 'Resistencia (%) Individual', 'Resistencia Promedio (MPa)', 'Resistencia (%)']
              df[columnas_numericas] = df[columnas_numericas].round(3)
              print(f'[+] Datos redondeados a 3 decimales')

              # Ordenar por Edad y Resistencia nominal (descendente)
              df = df.sort_values(['Edad (días)', 'Resistencia nominal (MPa)'], ascending=[False, False]).reset_index(drop=True)
              print(f'[+] Datos ordenados')

              # Guardar transformado
              df.to_excel(ruta_origen, index=False)
              print(f'[+] Datos guardados')

              # Aplicar formato
              wb = load_workbook(ruta_origen)
              ws = wb.active

              col_promedio = df.columns.get_loc('Resistencia Promedio (MPa)') + 1
              col_individual = df.columns.get_loc('Resistencia (MPa) Individual') + 1
              col_individual_pct = df.columns.get_loc('Resistencia (%) Individual') + 1
              col_conteo = df.columns.get_loc('Conteo Elementos') + 1

              columnas_verde_claro = ['Resistencia (%)', 'Proyecto', 'TIPO', 'Cilindro Nº', 'Código de mezcla', 'Localización', 'Toma', 'Rotura', 'Edad (días)', 'Resistencia nominal (MPa)']
              col_verde_claro_idx = [df.columns.get_loc(col) + 1 for col in columnas_verde_claro if col in df.columns]

              # Colores
              verde = PatternFill(start_color="00B050", end_color="00B050", fill_type="solid")
              azul_claro = PatternFill(start_color="ADD8E6", end_color="ADD8E6", fill_type="solid")
              verde_claro = PatternFill(start_color="90EE90", end_color="90EE90", fill_type="solid")
              azul_militar = PatternFill(start_color="1F4788", end_color="1F4788", fill_type="solid")
              blanco = Font(color="FFFFFF")

              # Colorear filas
              for row in range(2, ws.max_row + 1):
                  for col_idx in range(1, ws.max_column + 1):
                      celda = ws.cell(row, col_idx)

                      if col_idx in col_verde_claro_idx:
                          celda.fill = verde_claro
                      elif col_idx in [col_individual, col_individual_pct, col_conteo]:
                          celda.fill = azul_claro
                      elif col_idx == col_promedio:
                          valor = ws.cell(row, col_promedio).value
                          if valor is not None:
                              celda.fill = verde if valor >= 0 else PatternFill(start_color="FF0000", end_color="FF0000", fill_type="solid")

                  # Formato porcentaje
                  celda_pct = ws.cell(row, col_individual_pct)
                  celda_pct.number_format = '0.00"%"'

              # Colorear encabezados
              for col_idx in range(1, ws.max_column + 1):
                  celda_header = ws.cell(1, col_idx)
                  celda_header.fill = azul_militar
                  celda_header.font = blanco

              wb.save(ruta_origen)
              print(f'[+] ✓ Formato aplicado')

          print(f'\n[+] ✓ Transformación SGS completada')

          EOF

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 📤 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add datos/

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Descarga SGS - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "[+] ✅ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== RESULTADO FINAL ==="
          echo "Archivos en datos/:"
          ls -lh datos/ 2>/dev/null || echo "No hay archivos aún"
          echo ""
          echo "Últimos commits:"
          git log --oneline -3
