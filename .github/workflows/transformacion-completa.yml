name: Transformacion Completa SGS y Concrelab

on:
  workflow_dispatch:

jobs:
  transform:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pandas openpyxl
      
      - name: Transformar y reemplazar archivos
        shell: python
        run: |
          import pandas as pd
          import os
          from openpyxl import load_workbook
          from openpyxl.styles import PatternFill, Font
          
          ruta_datos = "datos"
          
          def obtener_tipo(loc):
              if pd.isna(loc):
                  return None
              loc_upper = str(loc).upper()
              if "MURO" in loc_upper:
                  return "MURO"
              elif "PLACA" in loc_upper:
                  return "PLACA"
              elif "AUTOCOMPACTABLE" in loc_upper:
                  return "AUTOCOMPACTABLE"
              elif "TREMIE" in loc_upper:
                  return "TREMIE"
              return None
          
          def formatear(ruta, df):
              wb = load_workbook(ruta)
              ws = wb.active
              for row in range(2, ws.max_row + 1):
                  for col in range(1, ws.max_column + 1):
                      ws.cell(row, col).fill = PatternFill(start_color="90EE90", fill_type="solid")
              for col in range(1, ws.max_column + 1):
                  ws.cell(1, col).fill = PatternFill(start_color="1F4788", fill_type="solid")
                  ws.cell(1, col).font = Font(color="FFFFFF")
              wb.save(ruta)
          
          archivos = [f for f in os.listdir(ruta_datos) if f.endswith('.xlsx')]
          print(f"[*] Archivos encontrados: {archivos}")
          
          for archivo in archivos:
              ruta_archivo = os.path.join(ruta_datos, archivo)
              
              if 'sgs' in archivo.lower():
                  print(f"[*] Transformando SGS: {archivo}")
                  df = pd.read_excel(ruta_archivo)
                  df = df.rename(columns={'codigoObra': 'Proyecto', 'edad': 'Edad (dias)', 'Resistencia Mpa': 'Resistencia (MPa)'})
                  if 'Localizacion' in df.columns:
                      df['TIPO'] = df['Localizacion'].apply(obtener_tipo)
                  df.to_excel(ruta_archivo, index=False)
                  formatear(ruta_archivo, df)
                  print(f"[+] SGS transformado y reemplazado")
              
              elif 'concrelab' in archivo.lower():
                  print(f"[*] Transformando Concrelab: {archivo}")
                  df = pd.read_excel(ruta_archivo, skiprows=3)
                  if 'Localizacion' in df.columns:
                      df['TIPO'] = df['Localizacion'].apply(obtener_tipo)
                  df.to_excel(ruta_archivo, index=False)
                  formatear(ruta_archivo, df)
                  print(f"[+] Concrelab transformado y reemplazado")
          
          print("[+] Todas las transformaciones completadas")
      
      - name: Commit y Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"
          git add datos/
          if ! git diff --quiet --cached; then
            git commit -m "[AUTO] Transformacion completa - archivos reemplazados en datos/"
            git push
          fi
