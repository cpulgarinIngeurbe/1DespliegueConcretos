name: 🎯 Orquestador - Descargas SGS + Concrelab

on:
  schedule:
    - cron: '0 14 * * *'  # 9:00 am Bogotá (14:00 UTC)
    - cron: '0 16 * * *'  # 11:00 am Bogotá (16:00 UTC)
    - cron: '0 18 * * *'  # 1:00 pm Bogotá (18:00 UTC)
    - cron: '0 20 * * *'  # 3:00 pm Bogotá (20:00 UTC)
    - cron: '0 23 * * *'  # 6:00 pm Bogotá (23:00 UTC)
  workflow_dispatch:

jobs:
  descargar-sgs:
    name: 📊 Ejecutar Descarga SGS
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Disparar workflow SGS
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'descarga-sgs.yml',
              ref: 'main'
            });
            console.log('Workflow SGS disparado exitosamente');

      - name: ⏳ Esperar a que SGS se complete
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const maxAttempts = 120; // 2 horas máximo (60s * 120)
            let attempt = 0;
            let completed = false;

            while (attempt < maxAttempts && !completed) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'descarga-sgs.yml',
                status: 'in_progress'
              });

              if (runs.data.workflow_runs.length === 0) {
                console.log('✅ SGS completado');
                completed = true;
              } else {
                attempt++;
                console.log(`⏳ Esperando SGS... intento ${attempt}/${maxAttempts}`);
                // Esperar 30 segundos
                await new Promise(resolve => setTimeout(resolve, 30000));
              }
            }

            if (!completed) {
              throw new Error('Timeout esperando a que SGS se complete');
            }

  descargar-concrelab:
    name: 📊 Ejecutar Descarga Concrelab
    runs-on: ubuntu-latest
    needs: descargar-sgs
    steps:
      - name: 🚀 Disparar workflow Concrelab
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'descarga-concrelab.yml',
              ref: 'main'
            });
            console.log('Workflow Concrelab disparado exitosamente');

      - name: ⏳ Esperar a que Concrelab se complete
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const maxAttempts = 120; // 2 horas máximo
            let attempt = 0;
            let completed = false;

            while (attempt < maxAttempts && !completed) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'descarga-concrelab.yml',
                status: 'in_progress'
              });

              if (runs.data.workflow_runs.length === 0) {
                console.log('✅ Concrelab completado');
                completed = true;
              } else {
                attempt++;
                console.log(`⏳ Esperando Concrelab... intento ${attempt}/${maxAttempts}`);
                // Esperar 30 segundos
                await new Promise(resolve => setTimeout(resolve, 30000));
              }
            }

            if (!completed) {
              throw new Error('Timeout esperando a que Concrelab se complete');
            }

  reporte-final:
    name: 📋 Reporte Final
    runs-on: ubuntu-latest
    needs: [descargar-sgs, descargar-concrelab]
    if: always()
    steps:
      - name: ✅ Descargas completadas
        run: |
          echo "================================"
          echo "✅ Ciclo de descargas completado"
          echo "================================"
          echo "1️⃣  SGS - Completado"
          echo "2️⃣  Concrelab - Completado"
          echo ""
          echo "Próxima ejecución en el siguiente horario programado"
