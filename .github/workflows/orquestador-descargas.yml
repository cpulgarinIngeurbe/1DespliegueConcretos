name: Orquestador - Descargas SGS + Concrelab

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 18 * * *'
    - cron: '0 20 * * *'
    - cron: '0 23 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  descargar-sgs:
    name: 1. Descargar SGS
    runs-on: ubuntu-latest
    steps:
      - name: Disparar workflow Descarga SGS
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'descarga-sgs.yml',
              ref: 'main'
            });
            console.log('SGS disparado');

      - name: Esperar a que SGS termine
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const maxAttempts = 240;
            let attempt = 0;
            let completed = false;
            let started = false;

            while (attempt < maxAttempts && !completed) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'descarga-sgs.yml'
              });

              const latestRun = runs.data.workflow_runs[0];
              if (latestRun) {
                if (latestRun.status === 'in_progress') {
                  started = true;
                  console.log(`[SGS] En progreso...`);
                } else if (latestRun.status === 'completed' && started) {
                  console.log('SGS completado');
                  completed = true;
                }
              }
              if (!completed) {
                attempt++;
                await new Promise(resolve => setTimeout(resolve, 30000));
              }
            }
            if (!completed) throw new Error('Timeout SGS');

  descargar-concrelab:
    name: 2. Descargar Concrelab
    runs-on: ubuntu-latest
    needs: descargar-sgs
    steps:
      - name: Disparar workflow Descarga Concrelab
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'descarga-concrelab.yml',
              ref: 'main'
            });
            console.log('Concrelab disparado');

      - name: Esperar a que Concrelab termine
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const maxAttempts = 120;
            let attempt = 0;
            let completed = false;

            while (attempt < maxAttempts && !completed) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'descarga-concrelab.yml',
                status: 'in_progress'
              });
              if (runs.data.workflow_runs.length === 0) {
                console.log('Concrelab completado');
                completed = true;
              } else {
                attempt++;
                await new Promise(resolve => setTimeout(resolve, 30000));
              }
            }
            if (!completed) throw new Error('Timeout Concrelab');

  transformacion:
    name: 3. Transformar Datos
    runs-on: ubuntu-latest
    needs: descargar-concrelab
    steps:
      - name: Disparar workflow Transformacion
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'transform-data.yml',
              ref: 'main'
            });
            console.log('Transformacion disparado');

      - name: Esperar a que Transformacion termine
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const maxAttempts = 120;
            let attempt = 0;
            let completed = false;

            while (attempt < maxAttempts && !completed) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'transform-data.yml',
                status: 'in_progress'
              });
              if (runs.data.workflow_runs.length === 0) {
                console.log('Transformacion completado');
                completed = true;
              } else {
                attempt++;
                await new Promise(resolve => setTimeout(resolve, 30000));
              }
            }
            if (!completed) throw new Error('Timeout Transformacion');

  consolidado-dashboard:
    name: 4. Consolidado y Dashboard
    runs-on: ubuntu-latest
    needs: transformacion
    steps:
      - name: Disparar workflow Consolidado y Dashboard
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'consolidado-dashboard.yml',
              ref: 'main'
            });
            console.log('Consolidado disparado');

      - name: Esperar a que Consolidado termine
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const maxAttempts = 120;
            let attempt = 0;
            let completed = false;

            while (attempt < maxAttempts && !completed) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'consolidado-dashboard.yml',
                status: 'in_progress'
              });
              if (runs.data.workflow_runs.length === 0) {
                console.log('Consolidado completado');
                completed = true;
              } else {
                attempt++;
                await new Promise(resolve => setTimeout(resolve, 30000));
              }
            }
            if (!completed) throw new Error('Timeout Consolidado');

  reporte-final:
    name: 5. Reporte Final
    runs-on: ubuntu-latest
    needs: [descargar-sgs, descargar-concrelab, transformacion, consolidado-dashboard]
    if: always()
    steps:
      - name: Ciclo completo
        run: |
          echo "Ciclo completo finalizado"
          echo "1. Descarga SGS"
          echo "2. Descarga Concrelab"
          echo "3. Transformacion"
          echo "4. Consolidado y Dashboard"
