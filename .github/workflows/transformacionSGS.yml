name: 📊 Transformación SGS

on:
  workflow_dispatch:

jobs:
  transformar-datos:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install pandas openpyxl

      - name: 📁 Crear carpeta DatosTransformados
        run: |
          mkdir -p DatosTransformados
          echo "[+] ✓ Carpeta DatosTransformados creada"

      - name: 🗑️ Limpiar DatosTransformados
        run: |
          rm -rf DatosTransformados/reporte_sgs_*.xlsx
          echo "[+] ✓ DatosTransformados limpiada"

      - name: 📈 Transformar archivos SGS
        run: |
          python << 'EOF'
          import pandas as pd
          import os

          ruta_datos = "datos"
          ruta_transformados = "DatosTransformados"

          # Buscar solo archivos de SGS
          archivos_excel = [f for f in os.listdir(ruta_datos) if f.startswith('reporte_sgs_') and f.endswith('.xlsx')]
          print(f'[*] Archivos SGS encontrados: {archivos_excel}')

          if not archivos_excel:
              print('[!] No se encontraron archivos reporte_sgs_*.xlsx')
              exit(0)

          for archivo in archivos_excel:
              ruta_origen = os.path.join(ruta_datos, archivo)
              ruta_destino = os.path.join(ruta_transformados, archivo)

              print(f'\n[*] Procesando: {archivo}')

              # Leer el archivo - NO elimina filas
              df = pd.read_excel(ruta_origen)
              print(f'[+] Filas leídas: {len(df)}')

              # Filtrar solo registros donde "tipoMaterial" contiene "Concreto"
              if 'tipoMaterial' in df.columns:
                  df_original = len(df)
                  df = df[df['tipoMaterial'].str.contains('Concreto', case=False, na=False)]
                  filas_filtradas = df_original - len(df)
                  print(f'[+] Filtrados por "Concreto": {len(df)} filas (eliminadas {filas_filtradas})')
              else:
                  print(f'[!] Advertencia: Campo "tipoMaterial" no encontrado')
                  print(f'[*] Columnas disponibles: {list(df.columns)}')

              # Organizar: ordenar por "fechaMuestreo" (más reciente), luego agrupar por "label", luego por "Edad" descendente
              if 'label' in df.columns and 'fechaMuestreo' in df.columns and 'edad' in df.columns:
                  print(f'[+] Ordenando por fecha (más reciente), agrupando por label y Edad (descendente)...')
                  # Ordenar por: fechaMuestreo (Z-A más reciente), label (A-Z para agrupar), edad (descendente números mayores)
                  df = df.sort_values(['fechaMuestreo', 'label', 'edad'], ascending=[False, True, False])
                  print(f'[+] ✅ Datos ordenados y agrupados correctamente')
              else:
                  campos_faltantes = []
                  if 'label' not in df.columns:
                      campos_faltantes.append('"label"')
                  if 'fechaMuestreo' not in df.columns:
                      campos_faltantes.append('"fechaMuestreo"')
                  if 'edad' not in df.columns:
                      campos_faltantes.append('"edad"')
                  print(f'[!] Advertencia: Campos no encontrados: {", ".join(campos_faltantes)}')

              # Eliminar columnas especificadas
              columnas_eliminar = [
                  'Densidad',
                  'ContenidoAire',
                  'Temperatura',
                  'Relación de Poisson',
                  'Módulo de elasticidad Mpa',
                  'Fecha de ensayo',
                  'falla',
                  'Resistencia Kg/Cm2',
                  'Resistencia Psi',
                  'hora de falla',
                  'dimension',
                  'asentamiento'
              ]

              columnas_encontradas = [col for col in columnas_eliminar if col in df.columns]
              columnas_no_encontradas = [col for col in columnas_eliminar if col not in df.columns]

              if columnas_encontradas:
                  df = df.drop(columns=columnas_encontradas)
                  print(f'[+] Columnas eliminadas ({len(columnas_encontradas)}): {", ".join(columnas_encontradas)}')

              if columnas_no_encontradas:
                  print(f'[!] Columnas no encontradas: {", ".join(columnas_no_encontradas)}')

              # Renombrar columnas especificadas
              renombramientos = {
                  'label': 'Cilindro N°',
                  'localizacion': 'Localización',
                  'fechaMuestreo': 'Toma',
                  'fechaRotura': 'Rotura',
                  'edad': 'Edad (días)',
                  'Resistencia Nominal Mpa': 'Resistencia nominal (MPa)',
                  'Resistencia Mpa': 'Resistencia (MPa)',
                  'porcentaje': 'Resistencia (%)',
                  'tipoMaterial': 'Tipo de mezcla',
                  'codigoObra': 'Proyecto',
                  'codigoMezcla': 'Código de mezcla'
              }

              columnas_renombradas = [col for col in renombramientos.keys() if col in df.columns]
              if columnas_renombradas:
                  df = df.rename(columns=renombramientos)
                  print(f'[+] Columnas renombradas ({len(columnas_renombradas)}): {", ".join(columnas_renombradas)}')

              # Reordenar columnas en el orden especificado
              orden_columnas = [
                  'Proyecto',
                  'Cilindro N°',
                  'codigoMezcla',
                  'Tipo de mezcla',
                  'Localización',
                  'Toma',
                  'Rotura',
                  'Edad (días)',
                  'Resistencia nominal (MPa)',
                  'Resistencia (MPa)',
                  'Resistencia (%)'
              ]

              # Filtrar solo las columnas que existen en el dataframe
              columnas_existentes = [col for col in orden_columnas if col in df.columns]
              if len(columnas_existentes) > 0:
                  df = df[columnas_existentes]
                  print(f'[+] Columnas reordenadas: {", ".join(columnas_existentes)}')

              # Guardar el archivo transformado
              df.to_excel(ruta_destino, index=False)
              print(f'[+] ✅ {archivo} transformado y guardado en DatosTransformados/')

          print('\n[+] ✓ Transformación completada')

          EOF

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add datos/ DatosTransformados/

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Transformación SGS - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== TRANSFORMACIÓN SGS COMPLETADA ==="
          echo ""
          echo "📤 Archivos transformados:"
          ls -lh DatosTransformados/ 2>/dev/null || echo "No hay archivos"
