name: 📦 Unificación

on:
  workflow_dispatch:

jobs:
  unificar-datos:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install pandas openpyxl

      - name: 📁 Crear carpeta desplegable
        run: |
          mkdir -p desplegable
          echo "[+] ✓ Carpeta desplegable creada"

      - name: 📋 Unificar archivos transformados
        run: |
          python << 'EOF'
          import pandas as pd
          import numpy as np
          import os
          from pathlib import Path
          from datetime import datetime, timedelta

          ruta_datos_transformados = "DatosTransformados"
          ruta_desplegable = "desplegable"
          archivo_unificado = os.path.join(ruta_desplegable, "Consolidado.xlsx")

          # Buscar todos los archivos Excel en DatosTransformados
          if not os.path.exists(ruta_datos_transformados):
              print(f'[!] La carpeta {ruta_datos_transformados} no existe')
              exit(1)

          archivos_excel = sorted([f for f in os.listdir(ruta_datos_transformados)
                                  if f.endswith('.xlsx')])

          print(f'[*] Total de archivos encontrados: {len(archivos_excel)}')
          print(f'[*] Archivos a unificar:')
          for archivo in archivos_excel:
              print(f'    - {archivo}')

          if not archivos_excel:
              print('[!] No se encontraron archivos para unificar')
              exit(0)

          # Leer y unificar todos los archivos
          dataframes = []
          registros_totales = 0

          for archivo in archivos_excel:
              ruta_archivo = os.path.join(ruta_datos_transformados, archivo)
              print(f'\n[*] Leyendo: {archivo}')
              try:
                  df = pd.read_excel(ruta_archivo)
                  num_registros = len(df)
                  num_columnas = len(df.columns)
                  print(f'  [+] {num_registros} registros cargados ({num_columnas} columnas)')
                  registros_totales += num_registros
                  dataframes.append(df)
              except Exception as e:
                  print(f'  [!] Error al leer {archivo}: {str(e)}')

          if not dataframes:
              print('[!] No se pudieron leer los archivos')
              exit(1)

          # Unificar todos los DataFrames
          print(f'\n[*] Unificando {len(dataframes)} archivo(s)...')
          df_unificado = pd.concat(dataframes, ignore_index=True)

          print(f'\n[+] ✅ Unificación completada:')
          print(f'  [+] Total de registros: {len(df_unificado)}')
          print(f'  [+] Verificación: suma de registros = {registros_totales}')
          print(f'  [+] Total de columnas: {len(df_unificado.columns)}')
          print(f'  [+] Columnas: {list(df_unificado.columns)}')

          # Normalizar valores en la columna "Proyecto"
          if 'Proyecto' in df_unificado.columns:
              print(f'\n[*] Normalizando valores de columna "Proyecto"...')

              # Mapeo de valores a reemplazar
              reemplazos = {
                  'B-19388 NATIVA': 'NATIVA',
                  'B-19322 VIALE 26': 'VIALE 26',
                  '23472 - TERRA (MANAZANA 4)': 'TERRA',
                  '24603 - FLORA - PARQUE CENTRAL LOS ROBLES': 'FLORA'
              }

              valores_antes = df_unificado['Proyecto'].nunique()

              for valor_original, valor_nuevo in reemplazos.items():
                  cantidad = (df_unificado['Proyecto'] == valor_original).sum()
                  if cantidad > 0:
                      df_unificado['Proyecto'] = df_unificado['Proyecto'].replace(valor_original, valor_nuevo)
                      print(f'  [+] "{valor_original}" → "{valor_nuevo}": {cantidad} registros')

              valores_despues = df_unificado['Proyecto'].nunique()
              print(f'  [+] Valores únicos: {valores_antes} → {valores_despues}')

          # Crear columna "TIPO ELEMENTO" basada en "Localización"
          if 'Localización' in df_unificado.columns:
              print(f'\n[*] Creando columna "TIPO ELEMENTO" basada en "Localización"...')

              def determinar_tipo_elemento(localizacion):
                  if pd.isna(localizacion):
                      return ''

                  texto = str(localizacion).lower()

                  # Mapeo de palabras clave a valores de TIPO ELEMENTO
                  # PLACA
                  if 'placa' in texto or 'plca' in texto:
                      return 'PLACA'

                  # MURO
                  elif 'muros' in texto or 'muro' in texto:
                      return 'MURO'
                  elif 'columnas' in texto or 'columna' in texto or 'colunas' in texto:
                      return 'MURO'
                  elif 'antepechos' in texto or 'antepecho' in texto:
                      return 'MURO'
                  elif 'dinteles' in texto or 'dintel' in texto:
                      return 'MURO'
                  elif 'salon' in texto:
                      return 'MURO'

                  # PILOTAJE
                  elif 'barrete' in texto:
                      return 'Pilotaje'
                  elif 'pilote' in texto or 'pulotes' in texto or 'ilote' in texto:
                      return 'Pilotaje'
                  elif 'polote' in texto:
                      return 'Pilotaje'
                  elif 'pantalla' in texto:
                      return 'Pilotaje'

                  # AUTOCOMPAC (mayoría de casos)
                  elif 'cimentación' in texto or 'cimentacion' in texto:
                      return 'AUTOCOMPAC'
                  elif 'plataforma' in texto:
                      return 'AUTOCOMPAC'
                  elif 'tanque' in texto:
                      return 'AUTOCOMPAC'
                  elif 'base' in texto:
                      return 'AUTOCOMPAC'
                  elif 'losa' in texto:
                      return 'AUTOCOMPAC'
                  elif 'bordillos' in texto or 'bordillo' in texto:
                      return 'AUTOCOMPAC'
                  elif 'grouting' in texto or 'grauting' in texto:
                      return 'AUTOCOMPAC'
                  elif 'rampa' in texto:
                      return 'AUTOCOMPAC'
                  elif 'matera' in texto:
                      return 'AUTOCOMPAC'
                  elif 'foso' in texto:
                      return 'AUTOCOMPAC'
                  elif 'mamposteria' in texto or 'mampostería' in texto or 'maposteria' in texto:
                      return 'AUTOCOMPAC'
                  elif 'ménsulas' in texto or 'mensula' in texto or 'mensulas' in texto or 'menzula' in texto:
                      return 'AUTOCOMPAC'
                  elif 'cubierta' in texto:
                      return 'AUTOCOMPAC'
                  elif 'escaleras' in texto or 'escalera' in texto:
                      return 'AUTOCOMPAC'
                  elif 'viga' in texto or 'vigas' in texto:
                      return 'AUTOCOMPAC'
                  elif 'zarpa' in texto:
                      return 'AUTOCOMPAC'
                  elif 'zapatas' in texto or 'zapata' in texto:
                      return 'AUTOCOMPAC'

                  # Default
                  else:
                      return 'OTRO'

              df_unificado['TIPO ELEMENTO'] = df_unificado['Localización'].apply(determinar_tipo_elemento)

              # Reemplazar "Pilotaje" por "TREMIE"
              cantidad_pilotaje = (df_unificado['TIPO ELEMENTO'] == 'Pilotaje').sum()
              if cantidad_pilotaje > 0:
                  df_unificado['TIPO ELEMENTO'] = df_unificado['TIPO ELEMENTO'].replace('Pilotaje', 'TREMIE')
                  print(f'  [+] Reemplazado "Pilotaje" → "TREMIE": {cantidad_pilotaje} registros')

              # Crear columna "Resistencia nominal (MPa) llave" acotando a valores predefinidos
              print(f'\n[*] Creando columna "Resistencia nominal (MPa) llave"...')
              if 'Resistencia nominal (MPa)' in df_unificado.columns:
                  # Valores posibles para acotamiento
                  valores_acotamiento = [21, 28, 34, 41, 48]

                  def acotar_a_valor_superior(valor):
                      if pd.isna(valor):
                          return valor
                      # Buscar el primer valor en la lista que sea >= al valor dado
                      for v in valores_acotamiento:
                          if v >= valor:
                              return v
                      # Si el valor es mayor que todos, retornar el máximo
                      return valores_acotamiento[-1]

                  df_unificado['Resistencia nominal (MPa) llave'] = df_unificado['Resistencia nominal (MPa)'].apply(acotar_a_valor_superior)
                  print(f'  [+] ✅ Columna "Resistencia nominal (MPa) llave" creada exitosamente')
                  print(f'  [+] Valores posibles de acotamiento: {valores_acotamiento}')
                  print(f'  [+] Registros procesados: {len(df_unificado)}')
                  print(f'  [+] Ejemplos:')
                  print(f'      - 19 → {acotar_a_valor_superior(19)}')
                  print(f'      - 26.5 → {acotar_a_valor_superior(26.5)}')
                  print(f'      - 41.2 → {acotar_a_valor_superior(41.2)}')
              else:
                  print(f'  [!] Advertencia: Columna "Resistencia nominal (MPa)" no encontrada')

              # Crear columna "Llave" concatenando TIPO ELEMENTO, Resistencia nominal (MPa) llave y Edad (días) como enteros
              print(f'\n[*] Creando columna "Llave"...')
              columnas_requeridas = ['TIPO ELEMENTO', 'Resistencia nominal (MPa) llave', 'Edad (días)']
              columnas_faltantes = [col for col in columnas_requeridas if col not in df_unificado.columns]

              if not columnas_faltantes:
                  df_unificado['Llave'] = (
                      df_unificado['TIPO ELEMENTO'].astype(str) + '-' +
                      df_unificado['Resistencia nominal (MPa) llave'].fillna(0).astype(int).astype(str) + '-' +
                      df_unificado['Edad (días)'].fillna(0).astype(int).astype(str)
                  )
                  print(f'  [+] ✅ Columna "Llave" creada exitosamente')
                  print(f'  [+] Formato: TIPO ELEMENTO-Resistencia nominal (MPa) llave (entero)-Edad (días) (entero)')
                  print(f'  [+] Ejemplo: {df_unificado["Llave"].iloc[0] if len(df_unificado) > 0 else "N/A"}')
              else:
                  print(f'  [!] Advertencia: Columnas no encontradas: {", ".join(columnas_faltantes)}')
                  print(f'  [!] No se pudo crear la columna "Llave"')

              # Mostrar resumen de tipos de elemento
              tipos_resumen = df_unificado['TIPO ELEMENTO'].value_counts()
              print(f'  [+] Distribución final de TIPO ELEMENTO:')
              for tipo, cantidad in tipos_resumen.items():
                  print(f'      - {tipo}: {cantidad} registros')
          else:
              print(f'\n[!] Advertencia: Columna "Localización" no encontrada')

          # Agregar columna "Fecha Descarga" con la fecha actual
          print(f'\n[*] Agregando columna "Fecha Descarga"...')
          fecha_hoy = datetime.now().date()
          df_unificado['Fecha Descarga'] = fecha_hoy
          print(f'  [+] ✅ Fecha actual agregada: {fecha_hoy}')

          # Crear columna "Estado" comparando con registros del día anterior
          print(f'\n[*] Creando columna "Estado" (comparando con registros de ayer)...')
          archivo_anterior = os.path.join(ruta_desplegable, "ConsolidadoAnterior.xlsx")
          df_unificado['Estado'] = 'NUEVO'
          df_unificado['Fecha Primera Aparición'] = fecha_hoy

          fecha_ayer = fecha_hoy - timedelta(days=1)

          if os.path.exists(archivo_anterior):
              try:
                  df_anterior = pd.read_excel(archivo_anterior)

                  # Convertir columna de fecha a datetime si existe
                  if 'Fecha Descarga' in df_anterior.columns:
                      df_anterior['Fecha Descarga'] = pd.to_datetime(df_anterior['Fecha Descarga']).dt.date

                      # Filtrar registros del día anterior
                      df_ayer = df_anterior[df_anterior['Fecha Descarga'] == fecha_ayer].copy()
                      cantidad_ayer = len(df_ayer)
                      print(f'  [+] Registros encontrados del día anterior ({fecha_ayer}): {cantidad_ayer}')

                      if 'Llave' in df_ayer.columns and 'Llave' in df_unificado.columns:
                          # Crear mapeo de Llave → Fecha Primera Aparición del archivo anterior
                          fecha_primera_aparicion_map = {}
                          if 'Fecha Primera Aparición' in df_anterior.columns:
                              for _, row in df_anterior.iterrows():
                                  llave = row['Llave']
                                  if pd.notna(llave):
                                      fecha_primera_aparicion_map[llave] = pd.to_datetime(row['Fecha Primera Aparición']).date()
                          else:
                              # Si no existe la columna, asumir que su primera aparición fue ayer
                              for _, row in df_ayer.iterrows():
                                  llave = row['Llave']
                                  if pd.notna(llave):
                                      fecha_primera_aparicion_map[llave] = fecha_ayer

                          # Obtener las llaves del día anterior
                          llaves_ayer = set(df_ayer['Llave'].dropna().unique())

                          # Marcar como EXISTENTE y asignar Fecha Primera Aparición
                          for idx, row in df_unificado.iterrows():
                              llave = row['Llave']
                              if pd.notna(llave) and llave in llaves_ayer:
                                  df_unificado.at[idx, 'Estado'] = 'EXISTENTE'
                                  if llave in fecha_primera_aparicion_map:
                                      df_unificado.at[idx, 'Fecha Primera Aparición'] = fecha_primera_aparicion_map[llave]

                          registros_nuevos = (df_unificado['Estado'] == 'NUEVO').sum()
                          registros_existentes = (df_unificado['Estado'] == 'EXISTENTE').sum()

                          print(f'  [+] ✅ Comparación completada')
                          print(f'  [+] Registros NUEVOS (hoy): {registros_nuevos}')
                          print(f'  [+] Registros EXISTENTES (desde ayer): {registros_existentes}')
                      else:
                          print(f'  [!] Advertencia: Columna "Llave" no encontrada para comparación')
                  else:
                      print(f'  [!] Advertencia: Columna "Fecha Descarga" no encontrada en archivo anterior')
                      print(f'  [!] Todos los registros marcados como NUEVO')
              except Exception as e:
                  print(f'  [!] Error al leer archivo anterior: {str(e)}')
                  print(f'  [!] Todos los registros marcados como NUEVO')
          else:
              print(f'  [!] Primera ejecución: todos los registros marcados como NUEVO')
              print(f'  [+] Registros NUEVOS: {len(df_unificado)}')

          # Inner Join con Curvas.xlsx para agregar "Resistencia Teórica (MPa)"
          print(f'\n[*] Realizando Inner Join con Curvas.xlsx...')
          archivo_curvas = os.path.join("Estandar", "Curvas.xlsx")

          if os.path.exists(archivo_curvas):
              try:
                  df_curvas = pd.read_excel(archivo_curvas)

                  if 'Llave' in df_curvas.columns and 'Llave' in df_unificado.columns:
                      # Verificar si existe la columna "Resistencia Teórica (MPa)" en Curvas
                      if 'Resistencia Teórica (MPa)' in df_curvas.columns:
                          # Seleccionar solo las columnas necesarias de Curvas
                          df_curvas_join = df_curvas[['Llave', 'Resistencia Teórica (MPa)']].copy()

                          # Realizar el merge (inner join)
                          registros_antes = len(df_unificado)
                          df_unificado = df_unificado.merge(
                              df_curvas_join,
                              on='Llave',
                              how='left'
                          )

                          coincidencias = df_unificado['Resistencia Teórica (MPa)'].notna().sum()
                          print(f'  [+] ✅ Join completado exitosamente')
                          print(f'  [+] Registros totales: {registros_antes}')
                          print(f'  [+] Registros con coincidencia: {coincidencias}')
                      else:
                          print(f'  [!] Advertencia: Columna "Resistencia Teórica (MPa)" no encontrada en Curvas.xlsx')
                  else:
                      print(f'  [!] Advertencia: Columna "Llave" no encontrada en uno de los archivos')
              except Exception as e:
                  print(f'  [!] Error al procesar Curvas.xlsx: {str(e)}')
          else:
              print(f'  [!] Advertencia: Archivo Curvas.xlsx no encontrado en carpeta Estandar')

          # Crear columna "Diferencia (MPa)" = Resistencia (MPa) - Resistencia Teórica (MPa)
          print(f'\n[*] Creando columna "Diferencia (MPa)"...')
          if 'Resistencia (MPa)' in df_unificado.columns and 'Resistencia Teórica (MPa)' in df_unificado.columns:
              df_unificado['Diferencia (MPa)'] = df_unificado['Resistencia (MPa)'] - df_unificado['Resistencia Teórica (MPa)']
              print(f'  [+] ✅ Columna "Diferencia (MPa)" creada exitosamente')
          else:
              print(f'  [!] Advertencia: No se pueden crear columnas (faltan "Resistencia (MPa)" o "Resistencia Teórica (MPa)")')

          # Guardar el archivo unificado
          df_unificado.to_excel(archivo_unificado, index=False)
          print(f'\n[+] ✅ Archivo unificado guardado en: {archivo_unificado}')
          print(f'  [+] Tamaño: {len(df_unificado)} registros x {len(df_unificado.columns)} columnas')

          # Aplicar formato condicional en Excel para columna "Diferencia (MPa)"
          print(f'\n[*] Aplicando formato condicional a "Diferencia (MPa)"...')
          try:
              from openpyxl import load_workbook
              from openpyxl.styles import PatternFill, Font, Alignment, numbers
              from openpyxl.formatting.rule import CellIsRule

              wb = load_workbook(archivo_unificado)
              ws = wb.active

              # Encontrar la columna "Diferencia (MPa)"
              col_diferencia = None
              for col_idx, cell in enumerate(ws[1], 1):
                  if cell.value == 'Diferencia (MPa)':
                      col_diferencia = col_idx
                      break

              if col_diferencia:
                  # Recorrer las celdas de datos (desde fila 2)
                  for row_idx in range(2, ws.max_row + 1):
                      cell = ws.cell(row=row_idx, column=col_diferencia)

                      if cell.value == 'Falta Teorico':
                          # Sin color especial para "Falta Teorico"
                          cell.alignment = Alignment(horizontal='center')
                      elif isinstance(cell.value, (int, float)):
                          # ROJO si es negativo (diferencia > 0)
                          if cell.value < 0:
                              cell.fill = PatternFill(start_color='FF0000', end_color='FF0000', fill_type='solid')
                              cell.font = Font(color='FFFFFF', bold=True)
                          # VERDE si es positivo o cero (diferencia <= 0)
                          else:
                              cell.fill = PatternFill(start_color='00B050', end_color='00B050', fill_type='solid')
                              cell.font = Font(color='FFFFFF', bold=True)

                          # Formato de número con 2 decimales
                          cell.number_format = '#,##0.00'
                          cell.alignment = Alignment(horizontal='center')

                  wb.save(archivo_unificado)
                  print(f'  [+] ✅ Formato condicional aplicado correctamente')
              else:
                  print(f'  [!] Advertencia: Columna "Diferencia (MPa)" no encontrada en Excel')

          except Exception as e:
              print(f'  [!] Error al aplicar formato condicional: {str(e)}')

          # Guardar copia para próxima ejecución y eliminar anterior
          import shutil
          if os.path.exists(archivo_anterior):
              os.remove(archivo_anterior)
          shutil.copy(archivo_unificado, archivo_anterior)
          print(f'  [+] Copia guardada para próxima ejecución')

          # Crear archivo ConsolidadoAlertas.xlsx con solo registros donde Edad (días) == 28
          print(f'\n[*] Creando archivo ConsolidadoAlertas.xlsx...')
          archivo_alertas = os.path.join(ruta_desplegable, "ConsolidadoAlertas.xlsx")

          if 'Edad (días)' in df_unificado.columns:
              # Filtrar registros donde Edad (días) == 28
              df_alertas = df_unificado[df_unificado['Edad (días)'] == 28].copy()
              cantidad_registros_alertas = len(df_alertas)

              # Ordenar por Proyecto y luego por Resistencia nominal (MPa) de menor a mayor
              if 'Proyecto' in df_alertas.columns and 'Resistencia nominal (MPa)' in df_alertas.columns:
                  df_alertas = df_alertas.sort_values(
                      by=['Proyecto', 'Resistencia nominal (MPa)'],
                      ascending=[True, True]
                  ).reset_index(drop=True)
                  print(f'  [+] Registros ordenados por Proyecto y Resistencia nominal (MPa)')
              else:
                  print(f'  [!] Advertencia: Columnas de ordenamiento no encontradas')

              # Crear columnas "Resistencia Promedio (MPa)" y "No. Registros Promedio"
              print(f'\n[*] Calculando Resistencia Promedio (MPa) y contando registros por grupo...')
              columnas_grupo = ['Cilindro N°', 'Localización', 'Toma']
              columnas_disponibles = [col for col in columnas_grupo if col in df_alertas.columns]

              if len(columnas_disponibles) == 3 and 'Resistencia (MPa)' in df_alertas.columns:
                  # Crear columnas inicializadas con NaN
                  df_alertas['Resistencia Promedio (MPa)'] = np.nan
                  df_alertas['No. Registros Promedio'] = np.nan

                  # Agrupar por Cilindro N°, Localización y Toma
                  for grupo, datos_grupo in df_alertas.groupby(columnas_grupo, dropna=False):
                      indices_grupo = datos_grupo.index.tolist()
                      cantidad_grupo = len(indices_grupo)

                      # Si el grupo tiene exactamente 3 registros
                      if cantidad_grupo == 3:
                          # Calcular el promedio de Resistencia (MPa)
                          promedio = datos_grupo['Resistencia (MPa)'].mean()

                          # Asignar el promedio y cantidad a todos los registros del grupo
                          df_alertas.loc[indices_grupo, 'Resistencia Promedio (MPa)'] = promedio
                          df_alertas.loc[indices_grupo, 'No. Registros Promedio'] = cantidad_grupo
                      else:
                          # Para otros grupos, solo indicar la cantidad de registros
                          df_alertas.loc[indices_grupo, 'No. Registros Promedio'] = cantidad_grupo

                  # Contar grupos de 3 registros
                  grupos_con_promedio = df_alertas['Resistencia Promedio (MPa)'].notna().sum()
                  print(f'  [+] ✅ Columnas creadas exitosamente')
                  print(f'  [+] "Resistencia Promedio (MPa)" - Registros con promedio: {grupos_con_promedio}')
                  print(f'  [+] "No. Registros Promedio" - Todos los registros tienen conteo de grupo')
              else:
                  print(f'  [!] Advertencia: No se pudieron crear las columnas (columnas faltantes)')

              # Crear columna "Promedio Móvil (MPa)" - Ventana móvil de 9 registros que avanza cada 3
              print(f'\n[*] Calculando Promedio Móvil (MPa)...')
              df_alertas['Promedio Móvil (MPa)'] = np.nan

              if 'Resistencia nominal (MPa) llave' in df_alertas.columns and 'Resistencia Promedio (MPa)' in df_alertas.columns:
                  # Agrupar por Resistencia nominal (MPa) llave para reiniciar en cada cambio
                  for valor_resistencia, grupo_resistencia in df_alertas.groupby('Resistencia nominal (MPa) llave', dropna=False):
                      indices_grupo = grupo_resistencia.index.tolist()
                      cantidad_registros = len(indices_grupo)

                      # ASEGURAR que los primeros 6 registros de ESTE grupo estén vacíos (sin nada)
                      primeros_6 = indices_grupo[:6]
                      df_alertas.loc[primeros_6, 'Promedio Móvil (MPa)'] = np.nan

                      # A partir del registro 7 (índice 6), procesar ventanas móviles
                      if cantidad_registros >= 9:
                          # Primera ventana: registros 0-8, mostrar en últimos 3 (6-8)
                          inicio = 0
                          fin = 9
                          paso = 3

                          while fin <= cantidad_registros:
                              # Índices de los 9 registros en esta ventana
                              ventana_indices = indices_grupo[inicio:fin]

                              # Últimos 3 registros de la ventana
                              ultimos_3 = ventana_indices[6:9]

                              # Calcular promedio de Resistencia Promedio
                              valores = df_alertas.loc[ventana_indices, 'Resistencia Promedio (MPa)'].dropna()

                              if len(valores) >= 3:
                                  promedio = valores.mean()
                                  df_alertas.loc[ultimos_3, 'Promedio Móvil (MPa)'] = promedio

                              # Avanzar a la siguiente ventana
                              inicio += paso
                              fin += paso

                  print(f'  [+] ✅ Columna "Promedio Móvil (MPa)" creada')
                  registros_con_movil = df_alertas['Promedio Móvil (MPa)'].notna().sum()
                  print(f'  [+] Registros con Promedio Móvil: {registros_con_movil}')
              else:
                  print(f'  [!] Advertencia: No se pudo crear Promedio Móvil (columnas faltantes)')

              # Guardar archivo de alertas
              df_alertas.to_excel(archivo_alertas, index=False)
              print(f'  [+] ✅ Archivo de alertas creado: {archivo_alertas}')
              print(f'  [+] Registros filtrados (Edad = 28): {cantidad_registros_alertas}')
              print(f'  [+] Tamaño: {cantidad_registros_alertas} registros x {len(df_alertas.columns)} columnas')
          else:
              print(f'  [!] Advertencia: Columna "Edad (días)" no encontrada')

          # Crear archivo de Incumplimientos (registros con Diferencia < 0, mostrados en ROJO)
          print(f'\n[*] Creando archivo Incumplimientos.xlsx...')
          archivo_incumplimientos = os.path.join(ruta_desplegable, "Incumplimientos.xlsx")

          if 'Diferencia (MPa)' in df_unificado.columns and 'Cilindro N°' in df_unificado.columns:
              # Paso 1: Identificar cilindros con Diferencia (MPa) < 0
              cilindros_incumplimiento = df_unificado[df_unificado['Diferencia (MPa)'] < 0]['Cilindro N°'].unique()
              print(f'  [DEBUG] Cilindros identificados con diferencia negativa: {len(cilindros_incumplimiento)}')
              print(f'  [DEBUG] Cilindros: {cilindros_incumplimiento[:10]}')  # Mostrar primeros 10

              # Paso 2: Incluir TODOS los registros de esos cilindros (sin importar si su diferencia es negativa o positiva)
              df_incumplimientos = df_unificado[df_unificado['Cilindro N°'].isin(cilindros_incumplimiento)].copy()
              cantidad_incumplimientos = len(df_incumplimientos)
              print(f'  [DEBUG] Registros totales encontrados para esos cilindros: {cantidad_incumplimientos}')

              if cantidad_incumplimientos > 0:
                  # Ordenar por Proyecto y Cilindro N° para agrupar registros del mismo cilindro
                  df_incumplimientos = df_incumplimientos.sort_values(
                      by=['Proyecto', 'Cilindro N°'],
                      ascending=[True, True]
                  ).reset_index(drop=True)

                  # Guardar archivo de incumplimientos
                  df_incumplimientos.to_excel(archivo_incumplimientos, index=False)
                  print(f'  [+] ✅ Archivo de incumplimientos creado: {archivo_incumplimientos}')
                  print(f'  [+] Cilindros con incumplimiento (Diferencia < 0): {len(cilindros_incumplimiento)}')
                  print(f'  [+] Registros totales de esos cilindros: {cantidad_incumplimientos}')
                  print(f'  [+] Tamaño: {cantidad_incumplimientos} registros x {len(df_incumplimientos.columns)} columnas')
              else:
                  print(f'  [+] ℹ️ No hay registros con incumplimiento (Diferencia < 0)')
          else:
              print(f'  [!] Advertencia: Columnas "Diferencia (MPa)" o "Cilindro N°" no encontradas')

          EOF

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add desplegable/

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Unificación de datos - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== UNIFICACIÓN COMPLETADA ==="
          echo ""
          echo "📤 Archivo unificado:"
          ls -lh desplegable/Consolidado.xlsx 2>/dev/null || echo "No hay archivo"
