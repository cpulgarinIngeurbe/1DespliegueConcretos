name: 📊 Transformación Concrelab

on:
  workflow_dispatch:

jobs:
  transformar-datos:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install pandas openpyxl

      - name: 📁 Crear carpeta DatosTransformados
        run: |
          mkdir -p DatosTransformados
          echo "[+] ✓ Carpeta DatosTransformados creada"

      - name: 🗑️ Limpiar DatosTransformados
        run: |
          rm -rf DatosTransformados/reporte_concrelab_*.xlsx
          echo "[+] ✓ DatosTransformados limpiada"

      - name: 📈 Transformar archivos Concrelab
        run: |
          python << 'EOF'
          import pandas as pd
          import os

          ruta_datos = "datos"
          ruta_transformados = "DatosTransformados"

          # Buscar solo archivos de Concrelab
          archivos_excel = [f for f in os.listdir(ruta_datos) if f.startswith('reporte_concrelab_') and f.endswith('.xlsx')]
          print(f'[*] Archivos Concrelab encontrados: {archivos_excel}')

          if not archivos_excel:
              print('[!] No se encontraron archivos reporte_concrelab_*.xlsx')
              exit(0)

          for archivo in archivos_excel:
              ruta_origen = os.path.join(ruta_datos, archivo)
              ruta_destino = os.path.join(ruta_transformados, archivo)

              print(f'\n[*] Procesando: {archivo}')

              # Leer el archivo saltando las 3 primeras filas
              df = pd.read_excel(ruta_origen, skiprows=3)
              print(f'[+] Filas iniciales: {len(df)}')

              # Filtrar solo registros donde "Tipo de mezcla" contiene "Concreto"
              if 'Tipo de mezcla' in df.columns:
                  df_original = len(df)
                  df = df[df['Tipo de mezcla'].str.contains('Concreto', case=False, na=False)]
                  filas_filtradas = df_original - len(df)
                  print(f'[+] Filtrados por "Concreto": {len(df)} filas (eliminadas {filas_filtradas})')
              else:
                  print(f'[!] Advertencia: Campo "Tipo de mezcla" no encontrado')
                  print(f'[*] Columnas disponibles: {list(df.columns)}')

              # Organizar: agrupar por "Cilindro N°" y ordenar por "Toma" (fecha)
              if 'Cilindro N°' in df.columns and 'Toma' in df.columns:
                  print(f'[+] Agrupando por "Cilindro N°" y ordenando por "Toma"...')
                  # Convertir "Toma" a datetime si no lo es
                  df['Toma'] = pd.to_datetime(df['Toma'], errors='coerce')
                  # Ordenar por Cilindro N° y luego por Toma (menor a mayor = ascendente)
                  df = df.sort_values(['Cilindro N°', 'Toma'])
                  print(f'[+] ✅ Datos organizados correctamente')
              else:
                  campos_faltantes = []
                  if 'Cilindro N°' not in df.columns:
                      campos_faltantes.append('"Cilindro N°"')
                  if 'Toma' not in df.columns:
                      campos_faltantes.append('"Toma"')
                  print(f'[!] Advertencia: Campos no encontrados: {", ".join(campos_faltantes)}')

              # Eliminar columnas especificadas
              columnas_eliminar = [
                  'Observaciones',
                  'Forma de falla',
                  'Resistencia (kg/cm²)',
                  'Carga máxima (kN)',
                  'Area (mm²)',
                  'Diámetro (mm)',
                  'Recepción',
                  'OT',
                  'Referencia'
              ]

              columnas_encontradas = [col for col in columnas_eliminar if col in df.columns]
              columnas_no_encontradas = [col for col in columnas_eliminar if col not in df.columns]

              if columnas_encontradas:
                  df = df.drop(columns=columnas_encontradas)
                  print(f'[+] Columnas eliminadas ({len(columnas_encontradas)}): {", ".join(columnas_encontradas)}')

              if columnas_no_encontradas:
                  print(f'[!] Columnas no encontradas: {", ".join(columnas_no_encontradas)}')

              # Guardar el archivo transformado
              df.to_excel(ruta_destino, index=False)
              print(f'[+] ✅ {archivo} transformado y guardado en DatosTransformados/')

          print('\n[+] ✓ Transformación completada')

          EOF

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add datos/ DatosTransformados/

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Transformación Concrelab - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== TRANSFORMACIÓN CONCRELAB COMPLETADA ==="
          echo ""
          echo "📤 Archivos transformados:"
          ls -lh DatosTransformados/ 2>/dev/null || echo "No hay archivos"
