name: 📊 Generar Dashboard

on:
  workflow_dispatch:

jobs:
  generar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install pandas openpyxl

      - name: 📊 Generar Dashboard con 3 Pestañas
        run: |
          python << 'PYTHON_SCRIPT'
          import pandas as pd
          import os
          from datetime import datetime

          archivo_consolidado = "desplegable/Consolidado.xlsx"
          archivo_alertas = "desplegable/ConsolidadoAlertas.xlsx"
          archivo_incumplimientos = "desplegable/Incumplimientos.xlsx"
          archivo_html = "index.html"

          datos_tabs = {}
          proyectos_consolidado = []

          # Leer Consolidado.xlsx
          if os.path.exists(archivo_consolidado):
              print(f'[*] Leyendo: {archivo_consolidado}')
              df_consolidado = pd.read_excel(archivo_consolidado)

              # Limpiar primeros 6 registros de Promedio Móvil por Proyecto y Resistencia nominal
              if 'Promedio Móvil (MPa)' in df_consolidado.columns and 'Resistencia nominal (MPa)' in df_consolidado.columns:
                  for proyecto in df_consolidado['Proyecto'].unique():
                      for resistencia in df_consolidado[df_consolidado['Proyecto'] == proyecto]['Resistencia nominal (MPa)'].unique():
                          mask = (df_consolidado['Proyecto'] == proyecto) & (df_consolidado['Resistencia nominal (MPa)'] == resistencia)
                          indices = df_consolidado[mask].index[:6]
                          df_consolidado.loc[indices, 'Promedio Móvil (MPa)'] = None

              # Redondear columnas numéricas a 2 decimales
              columnas_decimales = ['Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia (%)', 'Resistencia nominal (MPa) llave', 'Resistencia Teórica (MPa)', 'Diferencia (MPa)', 'Resistencia Promedio (MPa)', 'Promedio Móvil (MPa)']
              for col in columnas_decimales:
                  if col in df_consolidado.columns:
                      df_consolidado[col] = df_consolidado[col].apply(lambda x: round(x, 2) if pd.notna(x) else x)

              datos_tabs['consolidado'] = df_consolidado.to_json(orient='records')
              proyectos_consolidado = sorted([p for p in df_consolidado['Proyecto'].unique().tolist() if pd.notna(p)])
              print(f'[+] Consolidado cargado: {len(df_consolidado)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_consolidado}')
              datos_tabs['consolidado'] = '[]'

          # Leer ConsolidadoAlertas.xlsx
          if os.path.exists(archivo_alertas):
              print(f'[*] Leyendo: {archivo_alertas}')
              df_alertas = pd.read_excel(archivo_alertas)

              # Limpiar primeros 6 registros de Promedio Móvil por Proyecto y Resistencia nominal
              if 'Promedio Móvil (MPa)' in df_alertas.columns and 'Resistencia nominal (MPa)' in df_alertas.columns:
                  for proyecto in df_alertas['Proyecto'].unique():
                      for resistencia in df_alertas[df_alertas['Proyecto'] == proyecto]['Resistencia nominal (MPa)'].unique():
                          mask = (df_alertas['Proyecto'] == proyecto) & (df_alertas['Resistencia nominal (MPa)'] == resistencia)
                          indices = df_alertas[mask].index[:6]
                          df_alertas.loc[indices, 'Promedio Móvil (MPa)'] = None

              # Redondear columnas numéricas a 2 decimales
              columnas_decimales = ['Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia (%)', 'Resistencia nominal (MPa) llave', 'Resistencia Teórica (MPa)', 'Diferencia (MPa)', 'Resistencia Promedio (MPa)', 'Promedio Móvil (MPa)']
              for col in columnas_decimales:
                  if col in df_alertas.columns:
                      df_alertas[col] = df_alertas[col].apply(lambda x: round(x, 2) if pd.notna(x) else x)

              datos_tabs['alertas'] = df_alertas.to_json(orient='records')
              print(f'[+] Control 28 días cargado: {len(df_alertas)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_alertas}')
              datos_tabs['alertas'] = '[]'

          # Leer Incumplimientos.xlsx
          if os.path.exists(archivo_incumplimientos):
              print(f'[*] Leyendo: {archivo_incumplimientos}')
              df_incumplimientos = pd.read_excel(archivo_incumplimientos)

              # Redondear columnas numéricas a 2 decimales
              columnas_decimales = ['Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia (%)', 'Resistencia nominal (MPa) llave', 'Resistencia Teórica (MPa)', 'Diferencia (MPa)', 'Resistencia Promedio (MPa)', 'Promedio Móvil (MPa)']
              for col in columnas_decimales:
                  if col in df_incumplimientos.columns:
                      df_incumplimientos[col] = df_incumplimientos[col].apply(lambda x: round(x, 2) if pd.notna(x) else x)

              datos_tabs['incumplimientos'] = df_incumplimientos.to_json(orient='records')
              print(f'[+] Incumplimientos cargado: {len(df_incumplimientos)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_incumplimientos}')
              datos_tabs['incumplimientos'] = '[]'

          # Generar opciones del datalist
          opciones_html = ''
          for proyecto in proyectos_consolidado:
              opciones_html += f'<option value="{proyecto}"></option>'

          html = f"""<!DOCTYPE html>
          <html class="light" lang="es">
          <head>
              <meta charset="utf-8">
              <meta content="width=device-width, initial-scale=1.0" name="viewport">
              <title>Dashboard de Resistencias</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
              <style>
                  body {{ background-color: #ffffff; color: #141311; margin: 0; padding: 6px; font-family: 'Inter', sans-serif; font-size: 10px; zoom: 110%; }}
                  .container {{ max-width: 100%; margin: 0 auto; }}
                  .tabs-container {{ display: flex; gap: 4px; margin-bottom: 8px; border-bottom: 1px solid #A3C610; }}
                  .tab-button {{ padding: 4px 8px; background-color: transparent; border: none; color: #4B4F1D; font-weight: 600; font-size: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid transparent; transition: all 0.3s ease; }}
                  .tab-button:hover {{ color: #A3C610; }}
                  .tab-button.active {{ color: #A3C610; border-bottom-color: #A3C610; }}
                  .tab-content {{ display: none; }}
                  .tab-content.active {{ display: block; }}
                  .selector-section {{ margin-bottom: 8px; }}
                  .selector-label {{ font-size: 7px; color: #4B4F1D; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 2px; display: block; }}
                  .selector-dropdown {{ width: 100%; padding: 4px 5px; border: 1px solid #A3C610; background-color: #ffffff; color: #141311; border-radius: 3px; font-size: 8px; cursor: pointer; font-family: 'Inter', sans-serif; }}
                  .selector-dropdown:hover {{ background-color: #f8f8f7; }}
                  .selector-dropdown:focus {{ outline: none; border-color: #4B4F1D; background-color: #fffdf8; }}
                  .proyecto-input-row {{ display: flex; gap: 4px; align-items: flex-end; margin-bottom: 8px; justify-content: space-between; }}
                  .proyecto-input-wrapper {{ flex: 0 1 auto; width: 65%; }}
                  .proyecto-input-wrapper .selector-label {{ margin-bottom: 2px; }}
                  .proyecto-input-wrapper input {{ width: 100%; }}
                  .btn-reset {{ padding: 4px 8px; border: 1px solid #A3C610; background-color: #4B4F1D; color: #A3C610; border-radius: 3px; font-size: 8px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.3s ease; }}
                  .btn-reset:hover {{ background-color: #3d401a; border-color: #A3C610; }}
                  .btn-reset:active {{ background-color: #2f3215; }}
                  .filters-row {{ display: flex; gap: 6px; margin-bottom: 8px; }}
                  .filters-row .selector-section {{ margin-bottom: 0; flex: 1; }}
                  .filters-row .selector-dropdown {{ width: 100%; }}
                  .table-section {{ display: none; opacity: 0; }}
                  .table-section.active {{ display: block; transition: opacity 1500ms ease-in-out; opacity: 1; }}
                  table {{ border-collapse: collapse; width: 100%; }}
                  table th {{ background-color: #4B4F1D; color: #ffffff; padding: 3px 2px; text-align: left; font-weight: 600; font-size: 7px; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 0; z-index: 10; }}
                  table td {{ padding: 3px 2px; border-bottom: 0.5px solid #e5e2dd; font-size: 8px; }}
                  table tr:hover {{ background-color: #f8f8f7; }}
                  .red-negative {{ background-color: rgba(255, 0, 0, 0.15); }}
                  .green-bg {{ background-color: #f0f8f0; }}
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="tabs-container">
                      <button class="tab-button active" data-tab="consolidado">Consolidado</button>
                      <button class="tab-button" data-tab="alertas">Control 28 Días</button>
                      <button class="tab-button" data-tab="incumplimientos">Alertas Incumplimientos</button>
                  </div>

                  <div id="consolidado" class="tab-content active">
                      <div class="proyecto-input-row">
                          <div class="proyecto-input-wrapper">
                              <label class="selector-label">Seleccione el proyecto</label>
                              <input type="text" id="proyectoInputConsolidado" class="selector-dropdown" placeholder="Buscar proyecto..." list="proyectoListConsolidado" autocomplete="off" />
                              <datalist id="proyectoListConsolidado">
                                  {opciones_html}
                              </datalist>
                          </div>
                          <button id="btnResetConsolidado" class="btn-reset">Restaurar</button>
                      </div>
                      <div id="filtersRowConsolidado" class="filters-row" style="display: none; opacity: 0;">
                          <div id="cilindroSectionConsolidado" class="selector-section">
                              <label class="selector-label">Cilindro N°</label>
                              <select id="cilindroSelectorConsolidado" class="selector-dropdown"></select>
                          </div>
                          <div id="localizacionSectionConsolidado" class="selector-section">
                              <label class="selector-label">Localización</label>
                              <select id="localizacionSelectorConsolidado" class="selector-dropdown"></select>
                          </div>
                          <div id="tomaSectionConsolidado" class="selector-section">
                              <label class="selector-label">Toma</label>
                              <select id="tomaSelectorConsolidado" class="selector-dropdown"></select>
                          </div>
                      </div>
                      <div id="tableSectionConsolidado" class="table-section">
                          <table id="dataTableConsolidado">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>

                  <div id="alertas" class="tab-content">
                      <div class="proyecto-input-row">
                          <div class="proyecto-input-wrapper">
                              <label class="selector-label">Seleccione el proyecto</label>
                              <input type="text" id="proyectoInputAlertas" class="selector-dropdown" placeholder="Buscar proyecto..." list="proyectoListAlertas" autocomplete="off" />
                              <datalist id="proyectoListAlertas">
                                  {opciones_html}
                              </datalist>
                          </div>
                          <button id="btnResetAlertas" class="btn-reset">Restaurar</button>
                      </div>
                      <div id="filtersRowAlertas" class="filters-row" style="display: none; opacity: 0;">
                          <div id="cilindroSectionAlertas" class="selector-section">
                              <label class="selector-label">Cilindro N°</label>
                              <select id="cilindroSelectorAlertas" class="selector-dropdown"></select>
                          </div>
                          <div id="localizacionSectionAlertas" class="selector-section">
                              <label class="selector-label">Localización</label>
                              <select id="localizacionSelectorAlertas" class="selector-dropdown"></select>
                          </div>
                          <div id="tomaSectionAlertas" class="selector-section">
                              <label class="selector-label">Toma</label>
                              <select id="tomaSelectorAlertas" class="selector-dropdown"></select>
                          </div>
                          <div id="resistenciaNominalSectionAlertas" class="selector-section">
                              <label class="selector-label">Resistencia nominal (MPa)</label>
                              <select id="resistenciaNominalSelectorAlertas" class="selector-dropdown"></select>
                          </div>
                      </div>
                      <div id="tableSectionAlertas" class="table-section">
                          <table id="dataTableAlertas">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>

                  <div id="incumplimientos" class="tab-content">
                      <div class="proyecto-input-row">
                          <div class="proyecto-input-wrapper">
                              <label class="selector-label">Seleccione el proyecto</label>
                              <input type="text" id="proyectoInputIncumplimientos" class="selector-dropdown" placeholder="Buscar proyecto..." list="proyectoListIncumplimientos" autocomplete="off" />
                              <datalist id="proyectoListIncumplimientos">
                                  {opciones_html}
                              </datalist>
                          </div>
                          <button id="btnResetIncumplimientos" class="btn-reset">Restaurar</button>
                      </div>
                      <div id="filtersRowIncumplimientos" class="filters-row" style="display: none; opacity: 0;">
                          <div id="cilindroSectionIncumplimientos" class="selector-section">
                              <label class="selector-label">Cilindro N°</label>
                              <select id="cilindroSelectorIncumplimientos" class="selector-dropdown"></select>
                          </div>
                          <div id="localizacionSectionIncumplimientos" class="selector-section">
                              <label class="selector-label">Localización</label>
                              <select id="localizacionSelectorIncumplimientos" class="selector-dropdown"></select>
                          </div>
                          <div id="tomaSectionIncumplimientos" class="selector-section">
                              <label class="selector-label">Toma</label>
                              <select id="tomaSelectorIncumplimientos" class="selector-dropdown"></select>
                          </div>
                          <div id="resistenciaNominalSectionIncumplimientos" class="selector-section">
                              <label class="selector-label">Resistencia nominal (MPa)</label>
                              <select id="resistenciaNominalSelectorIncumplimientos" class="selector-dropdown"></select>
                          </div>
                      </div>
                      <div id="tableSectionIncumplimientos" class="table-section">
                          <table id="dataTableIncumplimientos">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>
              </div>

              <script>
                  const datosConsolidado = {datos_tabs['consolidado']};
                  const datosAlertas = {datos_tabs['alertas']};
                  const datosIncumplimientos = {datos_tabs['incumplimientos']};
                  // Elementos de la pestaña Consolidado
                  const proyectoInput = document.getElementById('proyectoInputConsolidado');
                  const selectorCilindro = document.getElementById('cilindroSelectorConsolidado');
                  const selectorLocalizacion = document.getElementById('localizacionSelectorConsolidado');
                  const selectorToma = document.getElementById('tomaSelectorConsolidado');
                  const filtersRow = document.getElementById('filtersRowConsolidado');
                  const tableSection = document.getElementById('tableSectionConsolidado');
                  const dataTable = document.getElementById('dataTableConsolidado');
                  const btnReset = document.getElementById('btnResetConsolidado');

                  // Elementos de pestañas
                  const tabButtons = document.querySelectorAll('.tab-button');
                  const tabContents = document.querySelectorAll('.tab-content');

                  let datosFiltrados = [];
                  let tablaVisible = false;
                  const proyectos = [...new Set(datosConsolidado.map(row => row['Proyecto']))].filter(p => p).sort();

                  // Función para cambiar pestañas
                  let pestanaActual = 'consolidado';
                  let filtrosGlobales = {{
                      proyecto: '',
                      cilindro: '',
                      localizacion: '',
                      toma: '',
                      resistenciaNominal: ''
                  }};

                  function guardarFiltros(pestana) {{
                      if (pestana === 'consolidado') {{
                          filtrosGlobales.proyecto = document.getElementById('proyectoInputConsolidado').value;
                          filtrosGlobales.cilindro = document.getElementById('cilindroSelectorConsolidado').value || '';
                          filtrosGlobales.localizacion = document.getElementById('localizacionSelectorConsolidado').value || '';
                          filtrosGlobales.toma = document.getElementById('tomaSelectorConsolidado').value || '';
                      }} else if (pestana === 'alertas') {{
                          filtrosGlobales.proyecto = document.getElementById('proyectoInputAlertas').value;
                          filtrosGlobales.cilindro = document.getElementById('cilindroSelectorAlertas').value || '';
                          filtrosGlobales.localizacion = document.getElementById('localizacionSelectorAlertas').value || '';
                          filtrosGlobales.toma = document.getElementById('tomaSelectorAlertas').value || '';
                          filtrosGlobales.resistenciaNominal = document.getElementById('resistenciaNominalSelectorAlertas').value || '';
                      }} else if (pestana === 'incumplimientos') {{
                          filtrosGlobales.proyecto = document.getElementById('proyectoInputIncumplimientos').value;
                          filtrosGlobales.cilindro = document.getElementById('cilindroSelectorIncumplimientos').value || '';
                          filtrosGlobales.localizacion = document.getElementById('localizacionSelectorIncumplimientos').value || '';
                          filtrosGlobales.toma = document.getElementById('tomaSelectorIncumplimientos').value || '';
                          filtrosGlobales.resistenciaNominal = document.getElementById('resistenciaNominalSelectorIncumplimientos').value || '';
                      }}
                  }}

                  function aplicarFiltros(pestana) {{
                      if (pestana === 'consolidado') {{
                          document.getElementById('proyectoInputConsolidado').value = filtrosGlobales.proyecto;
                          if (filtrosGlobales.cilindro) document.getElementById('cilindroSelectorConsolidado').value = filtrosGlobales.cilindro;
                          if (filtrosGlobales.localizacion) document.getElementById('localizacionSelectorConsolidado').value = filtrosGlobales.localizacion;
                          if (filtrosGlobales.toma) document.getElementById('tomaSelectorConsolidado').value = filtrosGlobales.toma;
                          if (filtrosGlobales.proyecto) document.getElementById('proyectoInputConsolidado').dispatchEvent(new Event('input', {{ bubbles: true }}));
                      }} else if (pestana === 'alertas') {{
                          document.getElementById('proyectoInputAlertas').value = filtrosGlobales.proyecto;
                          if (filtrosGlobales.cilindro) document.getElementById('cilindroSelectorAlertas').value = filtrosGlobales.cilindro;
                          if (filtrosGlobales.localizacion) document.getElementById('localizacionSelectorAlertas').value = filtrosGlobales.localizacion;
                          if (filtrosGlobales.toma) document.getElementById('tomaSelectorAlertas').value = filtrosGlobales.toma;
                          if (filtrosGlobales.resistenciaNominal) document.getElementById('resistenciaNominalSelectorAlertas').value = filtrosGlobales.resistenciaNominal;
                          if (filtrosGlobales.proyecto) document.getElementById('proyectoInputAlertas').dispatchEvent(new Event('input', {{ bubbles: true }}));
                      }} else if (pestana === 'incumplimientos') {{
                          document.getElementById('proyectoInputIncumplimientos').value = filtrosGlobales.proyecto;
                          if (filtrosGlobales.cilindro) document.getElementById('cilindroSelectorIncumplimientos').value = filtrosGlobales.cilindro;
                          if (filtrosGlobales.localizacion) document.getElementById('localizacionSelectorIncumplimientos').value = filtrosGlobales.localizacion;
                          if (filtrosGlobales.toma) document.getElementById('tomaSelectorIncumplimientos').value = filtrosGlobales.toma;
                          if (filtrosGlobales.resistenciaNominal) document.getElementById('resistenciaNominalSelectorIncumplimientos').value = filtrosGlobales.resistenciaNominal;
                          if (filtrosGlobales.proyecto) document.getElementById('proyectoInputIncumplimientos').dispatchEvent(new Event('input', {{ bubbles: true }}));
                      }}
                  }}

                  function cambiarPestana(nombrePestana) {{
                      // Guardar proyecto de la pestaña actual
                      if (pestanaActual === 'consolidado') {{
                          filtrosGlobales.proyecto = document.getElementById('proyectoInputConsolidado').value;
                      }} else if (pestanaActual === 'alertas') {{
                          filtrosGlobales.proyecto = document.getElementById('proyectoInputAlertas').value;
                      }} else if (pestanaActual === 'incumplimientos') {{
                          filtrosGlobales.proyecto = document.getElementById('proyectoInputIncumplimientos').value;
                      }}

                      // Cambiar a la nueva pestaña
                      tabContents.forEach(tab => tab.classList.remove('active'));
                      tabButtons.forEach(btn => btn.classList.remove('active'));

                      document.getElementById(nombrePestana).classList.add('active');
                      document.querySelector('[data-tab="' + nombrePestana + '"]').classList.add('active');

                      // Aplicar proyecto guardado a la nueva pestaña
                      if (nombrePestana === 'alertas') {{
                          document.getElementById('proyectoInputAlertas').value = filtrosGlobales.proyecto;
                      }} else if (nombrePestana === 'incumplimientos') {{
                          document.getElementById('proyectoInputIncumplimientos').value = filtrosGlobales.proyecto;
                      }} else if (nombrePestana === 'consolidado') {{
                          document.getElementById('proyectoInputConsolidado').value = filtrosGlobales.proyecto;
                      }}

                      pestanaActual = nombrePestana;
                  }}

                  tabButtons.forEach(btn => {{
                      btn.addEventListener('click', () => cambiarPestana(btn.dataset.tab));
                  }});

                  function recalcularOpcionesFiltros() {{
                      const cilindroSeleccionado = selectorCilindro.value;
                      const localizacionSeleccionada = selectorLocalizacion.value;
                      const tomaSeleccionada = selectorToma.value;

                      // Filtrar datos basándose en los filtros actuales
                      let datosTemp = datosFiltrados;

                      if (cilindroSeleccionado) {{
                          datosTemp = datosTemp.filter(row => row['Cilindro N°'] === cilindroSeleccionado);
                      }}
                      if (localizacionSeleccionada) {{
                          datosTemp = datosTemp.filter(row => row['Localización'] === localizacionSeleccionada);
                      }}
                      if (tomaSeleccionada) {{
                          datosTemp = datosTemp.filter(row => row['Toma'] === tomaSeleccionada);
                      }}

                      // Obtener opciones disponibles para cada filtro basándose en datosTemp
                      const cilindrosDisponibles = [...new Set(datosTemp.map(row => row['Cilindro N°']))].filter(c => c).sort();
                      const localizacionesDisponibles = [...new Set(datosTemp.map(row => row['Localización']))].filter(l => l).sort();
                      const tomasDisponibles = [...new Set(datosTemp.map(row => row['Toma']))].filter(t => t).sort();

                      // Actualizar selectores con opciones disponibles
                      const cilindroActual = selectorCilindro.value;
                      selectorCilindro.innerHTML = '<option value="">-- Todos los cilindros --</option>';
                      cilindrosDisponibles.forEach(cilindro => {{
                          const option = document.createElement('option');
                          option.value = cilindro;
                          option.textContent = cilindro;
                          selectorCilindro.appendChild(option);
                      }});
                      selectorCilindro.value = cilindroActual;

                      const localizacionActual = selectorLocalizacion.value;
                      selectorLocalizacion.innerHTML = '<option value="">-- Todas las localizaciones --</option>';
                      localizacionesDisponibles.forEach(localizacion => {{
                          const option = document.createElement('option');
                          option.value = localizacion;
                          option.textContent = localizacion;
                          selectorLocalizacion.appendChild(option);
                      }});
                      selectorLocalizacion.value = localizacionActual;

                      const tomaActual = selectorToma.value;
                      selectorToma.innerHTML = '<option value="">-- Todas las tomas --</option>';
                      tomasDisponibles.forEach(toma => {{
                          const option = document.createElement('option');
                          option.value = toma;
                          option.textContent = formatearFecha(toma);
                          selectorToma.appendChild(option);
                      }});
                      selectorToma.value = tomaActual;

                      // Actualizar tabla con filtros aplicados
                      actualizarFiltros();
                  }}

                  // Función para formatear fechas
                  function formatearFecha(valor) {{
                      if (!valor && valor !== 0) return '';

                      let timestamp = valor;

                      // Si es un string numérico, convertir a número
                      if (typeof valor === 'string' && /^\d+$/.test(valor)) {{
                          timestamp = parseFloat(valor);
                      }}

                      // Si es un timestamp (número)
                      if (typeof timestamp === 'number' && !isNaN(timestamp)) {{
                          // Si es timestamp en nanosegundos (muy grande), convertir a milisegundos
                          if (timestamp > 253402300799999) {{
                              timestamp = Math.floor(timestamp / 1000000);
                          }}
                          const fecha = new Date(timestamp);
                          const d = String(fecha.getDate()).padStart(2, '0');
                          const m = String(fecha.getMonth() + 1).padStart(2, '0');
                          const y = fecha.getFullYear();
                          return d + '-' + m + '-' + y;
                      }}

                      // Si es una cadena de texto (ISO format o similar)
                      if (typeof valor === 'string') {{
                          try {{
                              const fecha = new Date(valor);
                              if (!isNaN(fecha.getTime())) {{
                                  const d = String(fecha.getDate()).padStart(2, '0');
                                  const m = String(fecha.getMonth() + 1).padStart(2, '0');
                                  const y = fecha.getFullYear();
                                  return d + '-' + m + '-' + y;
                              }}
                          }} catch (e) {{
                              return valor;
                          }}
                      }}

                      return valor;
                  }}

