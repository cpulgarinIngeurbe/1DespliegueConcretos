name: 📊 Generar Dashboard

on:
  workflow_dispatch:

jobs:
  generar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install pandas openpyxl

      - name: 📊 Generar HTML desde Consolidado.xlsx
        run: |
          python << 'PYTHON_SCRIPT'
          import pandas as pd
          import os
          from datetime import datetime

          archivo_consolidado = "desplegable/Consolidado.xlsx"
          archivo_html = "index.html"

          if not os.path.exists(archivo_consolidado):
              print(f'[!] El archivo {archivo_consolidado} no existe')
              exit(1)

          print(f'[*] Leyendo: {archivo_consolidado}')
          df = pd.read_excel(archivo_consolidado)
          print(f'[+] Datos cargados: {len(df)} registros, {len(df.columns)} columnas')

          columnas = list(df.columns)
          num_registros = len(df)
          num_columnas = len(df.columns)
          fecha_generacion = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          print(f'[+] Columnas: {", ".join(columnas)}')

          tabla_html = df.head(100).to_html(classes='w-full border-collapse', index=False, justify='center')

          stats_html = ''
          for col in columnas[:5]:
              if pd.api.types.is_numeric_dtype(df[col]):
                  media = df[col].mean()
                  maximo = df[col].max()
                  minimo = df[col].min()
                  stats_html += f'<div class="glass-card-light p-4 rounded-lg border border-accent-active/20"><h3 class="font-label-sm text-accent-active uppercase tracking-wider mb-3">{col}</h3><div class="space-y-1 text-sm"><p><span class="text-secondary font-semibold">Media:</span> {media:.2f}</p><p><span class="text-secondary font-semibold">Máximo:</span> {maximo:.2f}</p><p><span class="text-secondary font-semibold">Mínimo:</span> {minimo:.2f}</p></div></div>'

          html = f"""<!DOCTYPE html>
          <html class="light" lang="es">
          <head>
              <meta charset="utf-8">
              <meta content="width=device-width, initial-scale=1.0" name="viewport">
              <title>Consolidado de Resistencias</title>
              <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
              <style>
                  body {{ background-color: #ffffff; color: #141311; margin: 0; padding: 24px; }}
                  table {{ border-collapse: collapse; width: 100%; }}
                  table th {{ background-color: #4B4F1D; color: #ffffff; padding: 12px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; }}
                  table td {{ padding: 12px; border-bottom: 1px solid #e5e2dd; }}
                  table tr:hover {{ background-color: #f8f8f7; }}
              </style>
          </head>
          <body>
              {tabla_html}
          </body>
          </html>"""

          with open(archivo_html, 'w', encoding='utf-8') as f:
              f.write(html)

          print(f'[+] ✅ HTML generado: {archivo_html}')
          PYTHON_SCRIPT

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add index.html

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Generar Dashboard - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== DASHBOARD GENERADO ==="
          echo ""
          echo "📄 Archivo generado:"
          ls -lh index.html 2>/dev/null || echo "No hay archivo"
