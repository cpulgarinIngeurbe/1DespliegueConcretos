name: 📊 Generar Dashboard

on:
  workflow_dispatch:

jobs:
  generar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install pandas openpyxl

      - name: 📊 Generar HTML desde Consolidado.xlsx
        run: python generarDashboard.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add index.html

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Generar Dashboard - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== DASHBOARD GENERADO ==="
          echo ""
          echo "📄 Archivo generado:"
          ls -lh index.html 2>/dev/null || echo "No hay archivo"
