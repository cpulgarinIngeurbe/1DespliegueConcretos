name: 📊 Generar Dashboard (Sin Filtros)

on:
  workflow_dispatch:

jobs:
  generar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install pandas openpyxl

      - name: 📊 Generar Dashboard con 3 Pestañas
        run: |
          python << 'PYTHON_SCRIPT'
          import pandas as pd
          import os
          import re
          from datetime import datetime

          def extraer_unidad_estructural(localizacion):
              """Extrae la unidad estructural del campo de Localización"""
              if pd.isna(localizacion):
                  return ''

              localizacion = str(localizacion).strip()

              # Torre
              if re.search(r'(?:TORRE|T)\s*(\d+)', localizacion, re.IGNORECASE):
                  match = re.search(r'(?:TORRE|T)\s*(\d+)', localizacion, re.IGNORECASE)
                  numero = match.group(1)
                  return f"Torre {int(numero):02d}"

              # Escaleras
              if re.search(r'ESCALERA', localizacion, re.IGNORECASE):
                  return 'Escalera'

              # Semisótano → Sótano
              if re.search(r'SEMISOTANO', localizacion, re.IGNORECASE):
                  return 'Sótano'

              # Pilotaje
              if re.search(r'PILOTE|PILOTAJE', localizacion, re.IGNORECASE):
                  return 'Pilotaje'

              # Plataforma
              if re.search(r'PLATAFORMA', localizacion, re.IGNORECASE):
                  return 'Plataforma'

              # Barrete
              if re.search(r'BARRETE', localizacion, re.IGNORECASE):
                  return 'Barrete'

              # Comunal → Salon Comunal
              if re.search(r'COMUNAL', localizacion, re.IGNORECASE):
                  return 'Salon Comunal'

              # Rampa
              if re.search(r'RAMP[AS]', localizacion, re.IGNORECASE):
                  return 'Rampa'

              return ''

          archivo_consolidado = "desplegable/Consolidado.xlsx"
          archivo_alertas = "desplegable/ConsolidadoAlertas.xlsx"
          archivo_incumplimientos = "desplegable/Incumplimientos.xlsx"
          archivo_html = "index.html"

          datos_tabs = {}
          proyectos_consolidado = []

          # Leer Consolidado.xlsx
          if os.path.exists(archivo_consolidado):
              print(f'[*] Leyendo: {archivo_consolidado}')
              df_consolidado = pd.read_excel(archivo_consolidado)

              # Crear columna UNIDAD ESTRUCTURAL
              if 'Localización' in df_consolidado.columns:
                  df_consolidado['UNIDAD ESTRUCTURAL'] = df_consolidado['Localización'].apply(extraer_unidad_estructural)
                  print(f'  [+] Columna "UNIDAD ESTRUCTURAL" creada')

              # Limpiar primeros 6 registros de Promedio Móvil por Proyecto y Resistencia nominal
              if 'Promedio Móvil (MPa)' in df_consolidado.columns and 'Resistencia nominal (MPa)' in df_consolidado.columns:
                  for proyecto in df_consolidado['Proyecto'].unique():
                      for resistencia in df_consolidado[df_consolidado['Proyecto'] == proyecto]['Resistencia nominal (MPa)'].unique():
                          mask = (df_consolidado['Proyecto'] == proyecto) & (df_consolidado['Resistencia nominal (MPa)'] == resistencia)
                          indices = df_consolidado[mask].index[:6]
                          df_consolidado.loc[indices, 'Promedio Móvil (MPa)'] = None

              # Redondear columnas numéricas a 2 decimales
              columnas_decimales = ['Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia (%)', 'Resistencia nominal (MPa) llave', 'Resistencia Teórica (MPa)', 'Diferencia (MPa)', 'Resistencia Promedio (MPa)', 'Promedio Móvil (MPa)', 'Resistencia Mínima (MPa)']
              for col in columnas_decimales:
                  if col in df_consolidado.columns:
                      df_consolidado[col] = df_consolidado[col].apply(lambda x: round(x, 2) if pd.notna(x) else x)

              datos_tabs['consolidado'] = df_consolidado.to_json(orient='records')
              proyectos_consolidado = sorted([p for p in df_consolidado['Proyecto'].unique().tolist() if pd.notna(p)])
              print(f'[+] Consolidado cargado: {len(df_consolidado)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_consolidado}')
              datos_tabs['consolidado'] = '[]'

          # Leer ConsolidadoAlertas.xlsx
          if os.path.exists(archivo_alertas):
              print(f'[*] Leyendo: {archivo_alertas}')
              df_alertas = pd.read_excel(archivo_alertas)

              # Crear columna UNIDAD ESTRUCTURAL
              if 'Localización' in df_alertas.columns:
                  df_alertas['UNIDAD ESTRUCTURAL'] = df_alertas['Localización'].apply(extraer_unidad_estructural)
                  print(f'  [+] Columna "UNIDAD ESTRUCTURAL" creada')

              # Limpiar primeros 6 registros de Promedio Móvil por Proyecto y Resistencia nominal
              if 'Promedio Móvil (MPa)' in df_alertas.columns and 'Resistencia nominal (MPa)' in df_alertas.columns:
                  for proyecto in df_alertas['Proyecto'].unique():
                      for resistencia in df_alertas[df_alertas['Proyecto'] == proyecto]['Resistencia nominal (MPa)'].unique():
                          mask = (df_alertas['Proyecto'] == proyecto) & (df_alertas['Resistencia nominal (MPa)'] == resistencia)
                          indices = df_alertas[mask].index[:6]
                          df_alertas.loc[indices, 'Promedio Móvil (MPa)'] = None

              # Redondear columnas numéricas a 2 decimales
              columnas_decimales = ['Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia (%)', 'Resistencia nominal (MPa) llave', 'Resistencia Teórica (MPa)', 'Diferencia (MPa)', 'Resistencia Promedio (MPa)', 'Promedio Móvil (MPa)', 'Resistencia Mínima (MPa)']
              for col in columnas_decimales:
                  if col in df_alertas.columns:
                      df_alertas[col] = df_alertas[col].apply(lambda x: round(x, 2) if pd.notna(x) else x)

              datos_tabs['alertas'] = df_alertas.to_json(orient='records')
              print(f'[+] Control 28 días cargado: {len(df_alertas)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_alertas}')
              datos_tabs['alertas'] = '[]'

          # Leer Incumplimientos.xlsx
          if os.path.exists(archivo_incumplimientos):
              print(f'[*] Leyendo: {archivo_incumplimientos}')
              df_incumplimientos = pd.read_excel(archivo_incumplimientos)

              # Crear columna UNIDAD ESTRUCTURAL
              if 'Localización' in df_incumplimientos.columns:
                  df_incumplimientos['UNIDAD ESTRUCTURAL'] = df_incumplimientos['Localización'].apply(extraer_unidad_estructural)
                  print(f'  [+] Columna "UNIDAD ESTRUCTURAL" creada')

              # Redondear columnas numéricas a 2 decimales
              columnas_decimales = ['Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia (%)', 'Resistencia nominal (MPa) llave', 'Resistencia Teórica (MPa)', 'Diferencia (MPa)', 'Resistencia Promedio (MPa)', 'Promedio Móvil (MPa)', 'Resistencia Mínima (MPa)']
              for col in columnas_decimales:
                  if col in df_incumplimientos.columns:
                      df_incumplimientos[col] = df_incumplimientos[col].apply(lambda x: round(x, 2) if pd.notna(x) else x)

              datos_tabs['incumplimientos'] = df_incumplimientos.to_json(orient='records')
              print(f'[+] Incumplimientos cargado: {len(df_incumplimientos)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_incumplimientos}')
              datos_tabs['incumplimientos'] = '[]'

          # Generar opciones del datalist
          opciones_html = ''
          for proyecto in proyectos_consolidado:
              opciones_html += f'<option value="{proyecto}"></option>'

          html = f"""<!DOCTYPE html>
          <html class="light" lang="es">
          <head>
              <meta charset="utf-8">
              <meta content="width=device-width, initial-scale=1.0" name="viewport">
              <title>Dashboard de Resistencias</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
              <style>
                  body {{ background-color: #ffffff; color: #141311; margin: 0; padding: 6px; font-family: 'Inter', sans-serif; font-size: 10px; zoom: 110%; }}
                  .container {{ max-width: 100%; margin: 0 auto; }}
                  .tabs-container {{ display: flex; gap: 4px; margin-bottom: 8px; border-bottom: 1px solid #A3C610; }}
                  .tab-button {{ padding: 4px 8px; background-color: transparent; border: none; color: #4B4F1D; font-weight: 600; font-size: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid transparent; transition: all 0.3s ease; }}
                  .tab-button:hover {{ color: #A3C610; }}
                  .tab-button.active {{ color: #A3C610; border-bottom-color: #A3C610; }}
                  .tab-content {{ display: none; }}
                  .tab-content.active {{ display: block; }}
                  .selector-section {{ margin-bottom: 8px; }}
                  .selector-label {{ font-size: 7px; color: #4B4F1D; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 2px; display: block; }}
                  .selector-dropdown {{ width: 100%; padding: 4px 5px; border: 1px solid #A3C610; background-color: #ffffff; color: #141311; border-radius: 3px; font-size: 8px; cursor: pointer; font-family: 'Inter', sans-serif; }}
                  .selector-dropdown:hover {{ background-color: #f8f8f7; }}
                  .selector-dropdown:focus {{ outline: none; border-color: #4B4F1D; background-color: #fffdf8; }}
                  .proyecto-input-row {{ display: flex; gap: 4px; align-items: flex-end; margin-bottom: 8px; justify-content: space-between; }}
                  .proyecto-input-wrapper {{ flex: 0 1 auto; width: 65%; }}
                  .proyecto-input-wrapper .selector-label {{ margin-bottom: 2px; }}
                  .proyecto-input-wrapper input {{ width: 100%; }}
                  .btn-reset {{ padding: 4px 8px; border: 1px solid #A3C610; background-color: #4B4F1D; color: #A3C610; border-radius: 3px; font-size: 8px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.3s ease; }}
                  .btn-reset:hover {{ background-color: #3d401a; border-color: #A3C610; }}
                  .btn-reset:active {{ background-color: #2f3215; }}
                  .filters-row {{ display: flex; gap: 6px; margin-bottom: 8px; }}
                  .filters-row .selector-section {{ margin-bottom: 0; flex: 1; }}
                  .filters-row .selector-dropdown {{ width: 100%; }}
                  .table-section {{ display: none; opacity: 0; }}
                  .table-section.active {{ display: block; transition: opacity 1500ms ease-in-out; opacity: 1; }}
                  table {{ border-collapse: collapse; width: 100%; }}
                  table th {{ background-color: #4B4F1D; color: #ffffff; padding: 3px 2px; text-align: left; font-weight: 600; font-size: 7px; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 0; z-index: 10; }}
                  table td {{ padding: 3px 2px; border-bottom: 0.5px solid #e5e2dd; font-size: 8px; }}
                  table tr:hover {{ background-color: #f8f8f7; }}
                  .red-negative {{ background-color: rgba(255, 0, 0, 0.15); }}
                  .green-bg {{ background-color: #f0f8f0; }}
                  .yellow-bg {{ background-color: #fffacd; }}
                  .group-separator td {{ border-top: 2.5px solid #7CB342 !important; }}
                  .filter-section {{ margin-bottom: 12px; position: relative; }}
                  .filter-btn {{ padding: 6px 12px; background-color: #4B4F1D; color: #A3C610; border: 1px solid #A3C610; border-radius: 3px; font-size: 8px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-transform: uppercase; }}
                  .filter-btn:hover {{ background-color: #3d401a; }}
                  .filter-dropdown {{ display: none; position: absolute; background: #ffffff; border: 1px solid #4B4F1D; border-radius: 3px; min-width: 220px; max-height: 250px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); top: 32px; left: 0; }}
                  .filter-dropdown.open {{ display: block; }}
                  .filter-option {{ padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid #e5e2dd; cursor: pointer; }}
                  .filter-option:hover {{ background-color: #f8f8f7; }}
                  .filter-option input[type="checkbox"] {{ cursor: pointer; accent-color: #4B4F1D; }}
                  .filter-option-label {{ flex: 1; font-size: 8px; cursor: pointer; }}
                  .filter-tags {{ display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }}
                  .filter-tag {{ background-color: #f0f5a0; border: 1px solid #A3C610; color: #3D4800; padding: 4px 8px; border-radius: 3px; font-size: 8px; display: flex; align-items: center; gap: 4px; }}
                  .filter-tag-close {{ background: none; border: none; color: #3D4800; cursor: pointer; font-size: 10px; padding: 0; font-weight: bold; }}
                  .filter-tag-close:hover {{ color: #2f3215; }}
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="tabs-container">
                      <button class="tab-button active" data-tab="consolidado">Consolidado</button>
                      <button class="tab-button" data-tab="alertas">Control 28 Días</button>
                      <button class="tab-button" data-tab="incumplimientos">Alertas Incumplimientos</button>
                  </div>

                  <div id="consolidado" class="tab-content active">
                      <div class="filter-section">
                          <button class="filter-btn" id="filterBtnConsolidado">Filtrar por Proyecto</button>
                          <div class="filter-dropdown" id="filterDropdownConsolidado"></div>
                          <div class="filter-tags" id="filterTagsConsolidado"></div>
                      </div>
                      <div id="tableSectionConsolidado" class="table-section">
                          <table id="dataTableConsolidado">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>

                  <div id="alertas" class="tab-content">
                      <div class="filter-section">
                          <button class="filter-btn" id="filterBtnAlertas">Filtrar por Proyecto</button>
                          <div class="filter-dropdown" id="filterDropdownAlertas"></div>
                          <div class="filter-tags" id="filterTagsAlertas"></div>
                      </div>
                      <div id="tableSectionAlertas" class="table-section">
                          <table id="dataTableAlertas">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>

                  <div id="incumplimientos" class="tab-content">
                      <div class="filter-section">
                          <button class="filter-btn" id="filterBtnIncumplimientos">Filtrar por Proyecto</button>
                          <div class="filter-dropdown" id="filterDropdownIncumplimientos"></div>
                          <div class="filter-tags" id="filterTagsIncumplimientos"></div>
                      </div>
                      <div id="tableSectionIncumplimientos" class="table-section">
                          <table id="dataTableIncumplimientos">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>
              </div>

              <script>
                  // Datos de las tres pestañas
                  const datosConsolidado = {datos_tabs['consolidado']};
                  const datosAlertas = {datos_tabs['alertas']};
                  const datosIncumplimientos = {datos_tabs['incumplimientos']};

                  // Referencias a elementos del DOM
                  const tabButtons = document.querySelectorAll('.tab-button');
                  const tabContents = document.querySelectorAll('.tab-content');
                  const tableSectionConsolidado = document.getElementById('tableSectionConsolidado');
                  const tableSectionAlertas = document.getElementById('tableSectionAlertas');
                  const tableSectionIncumplimientos = document.getElementById('tableSectionIncumplimientos');
                  const dataTableConsolidado = document.getElementById('dataTableConsolidado');
                  const dataTableAlertas = document.getElementById('dataTableAlertas');
                  const dataTableIncumplimientos = document.getElementById('dataTableIncumplimientos');

                  const filterBtnConsolidado = document.getElementById('filterBtnConsolidado');
                  const filterBtnAlertas = document.getElementById('filterBtnAlertas');
                  const filterBtnIncumplimientos = document.getElementById('filterBtnIncumplimientos');
                  const filterDropdownConsolidado = document.getElementById('filterDropdownConsolidado');
                  const filterDropdownAlertas = document.getElementById('filterDropdownAlertas');
                  const filterDropdownIncumplimientos = document.getElementById('filterDropdownIncumplimientos');
                  const filterTagsConsolidado = document.getElementById('filterTagsConsolidado');
                  const filterTagsAlertas = document.getElementById('filterTagsAlertas');
                  const filterTagsIncumplimientos = document.getElementById('filterTagsIncumplimientos');

                  // Función para actualizar tags
                  function actualizarTags(tagsContainer, proyectosSeleccionados, onRemoveCallback) {{
                      tagsContainer.innerHTML = '';
                      proyectosSeleccionados.forEach(proyecto => {{
                          const tag = document.createElement('div');
                          tag.className = 'filter-tag';
                          tag.innerHTML = proyecto + ' <button class="filter-tag-close">×</button>';
                          tag.querySelector('.filter-tag-close').addEventListener('click', () => {{
                              onRemoveCallback(proyecto);
                          }});
                          tagsContainer.appendChild(tag);
                      }});
                  }}

                  // Variable para almacenar proyectos seleccionados
                  let proyectosSeleccionadosConsolidado = [];
                  let proyectosSeleccionadosAlertas = [];
                  let proyectosSeleccionadosIncumplimientos = [];

                  // Función para obtener proyectos únicos
                  function obtenerProyectosUnicos(datos) {{
                      const proyectos = new Set();
                      datos.forEach(row => {{
                          if (row['Proyecto'] && row['Proyecto'].trim() !== '') {{
                              proyectos.add(row['Proyecto']);
                          }}
                      }});
                      return Array.from(proyectos).sort();
                  }}

                  // Función para filtrar datos por proyectos seleccionados
                  function filtrarPorProyectos(datos, proyectosSeleccionados) {{
                      if (proyectosSeleccionados.length === 0) {{
                          return [];
                      }}
                      return datos.filter(row => proyectosSeleccionados.includes(row['Proyecto']));
                  }}

                  // Función para llenar dropdown con checkboxes
                  function llenarDropdown(dropdownElement, proyectos, onChangeCallback) {{
                      dropdownElement.innerHTML = '';
                      proyectos.forEach(proyecto => {{
                          const option = document.createElement('div');
                          option.className = 'filter-option';

                          const checkbox = document.createElement('input');
                          checkbox.type = 'checkbox';
                          checkbox.value = proyecto;

                          const label = document.createElement('label');
                          label.className = 'filter-option-label';
                          label.textContent = proyecto;

                          checkbox.addEventListener('change', () => {{
                              onChangeCallback();
                              // Cerrar el dropdown después de seleccionar
                              dropdownElement.classList.remove('open');
                          }});

                          option.appendChild(checkbox);
                          option.appendChild(label);
                          dropdownElement.appendChild(option);
                      }});
                  }}

                  // Función para formatear fechas
                  function formatearFecha(valor) {{
                      if (!valor && valor !== 0) return '';

                      let timestamp = valor;

                      // Si es un string numérico, convertir a número
                      if (typeof valor === 'string' && /^\d+$/.test(valor)) {{
                          timestamp = parseFloat(valor);
                      }}

                      // Si es un timestamp (número)
                      if (typeof timestamp === 'number' && !isNaN(timestamp)) {{
                          // Si es timestamp en nanosegundos (muy grande), convertir a milisegundos
                          if (timestamp > 253402300799999) {{
                              timestamp = Math.floor(timestamp / 1000000);
                          }}
                          const fecha = new Date(timestamp);
                          const d = String(fecha.getDate()).padStart(2, '0');
                          const m = String(fecha.getMonth() + 1).padStart(2, '0');
                          const y = fecha.getFullYear();
                          return d + '-' + m + '-' + y;
                      }}

                      // Si es una cadena de texto (ISO format o similar)
                      if (typeof valor === 'string') {{
                          try {{
                              const fecha = new Date(valor);
                              if (!isNaN(fecha.getTime())) {{
                                  const d = String(fecha.getDate()).padStart(2, '0');
                                  const m = String(fecha.getMonth() + 1).padStart(2, '0');
                                  const y = fecha.getFullYear();
                                  return d + '-' + m + '-' + y;
                              }}
                          }} catch (e) {{
                              return valor;
                          }}
                      }}

                      return valor;
                  }}

                  // Función para generar tabla de Consolidado
                  function generarTabla(datos, conDelay = false, datosCompletos = null) {{
                      const thead = dataTableConsolidado.querySelector('thead');
                      const tbody = dataTableConsolidado.querySelector('tbody');

                      tbody.innerHTML = '';

                      // Usar datosCompletos para extraer headers si se pasa, sino usar datos
                      const datosParaHeaders = datosCompletos || datos || datosConsolidado;
                      if (datosParaHeaders.length > 0 && thead.innerHTML === '') {{
                          thead.innerHTML = '';
                          const headers = Object.keys(datosParaHeaders[0]);
                          const headerRow = document.createElement('tr');
                          headers.forEach(header => {{
                              const th = document.createElement('th');
                              th.textContent = header;
                              headerRow.appendChild(th);
                          }});
                          thead.appendChild(headerRow);
                      }}

                      // Solo agregar filas si hay datos
                      if (datos.length > 0) {{
                          const headers = Object.keys(datos[0]);
                          const headerRow = document.createElement('tr');
                          headers.forEach(header => {{
                              const th = document.createElement('th');
                              th.textContent = header;
                              headerRow.appendChild(th);
                          }});
                          thead.appendChild(headerRow);

                          let grupoAnterior = null;
                          datos.forEach(row => {{
                              const tr = document.createElement('tr');
                              headers.forEach(header => {{
                                  const td = document.createElement('td');
                                  let valor = row[header] !== null ? row[header] : '';

                                  // Formatear fechas para columnas específicas
                                  if ((header === 'Rotura' || header === 'Toma' || header === 'Fecha Descarga') && valor !== '') {{
                                      valor = formatearFecha(valor);
                                  }}

                                  // Formatear valores numéricos a 2 decimales
                                  const columnasDecimales = ['Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia (%)', 'Resistencia nominal (MPa) llave', 'Resistencia Teórica (MPa)', 'Diferencia (MPa)', 'Resistencia Promedio (MPa)', 'Promedio Móvil (MPa)'];
                                  if (columnasDecimales.includes(header) && valor !== '') {{
                                      if (typeof valor === 'number' && !isNaN(valor)) {{
                                          valor = valor.toFixed(2);
                                      }} else if (typeof valor === 'string') {{
                                          const numValue = parseFloat(valor);
                                          if (!isNaN(numValue) && isFinite(numValue)) {{
                                              valor = numValue.toFixed(2);
                                          }}
                                      }}
                                  }}

                                  td.textContent = valor;

                                  // Colorear celdas negativas o cero en columna "Diferencia (MPa)"
                                  if (header === 'Diferencia (MPa)' && valor !== '' && parseFloat(valor) <= 0) {{
                                      td.classList.add('red-negative');
                                  }}

                                  // Colorear en amarillo "Resistencia (MPa)" si es menor a "Resistencia Teórica (MPa)"
                                  if (header === 'Resistencia (MPa)' && valor !== '') {{
                                      const resistencia = parseFloat(valor);
                                      const resistenciaTeórica = row['Resistencia Teórica (MPa)'];
                                      if (!isNaN(resistencia) && resistenciaTeórica !== null && resistenciaTeórica !== undefined) {{
                                          const resistenciaTeóricaNum = parseFloat(resistenciaTeórica);
                                          if (!isNaN(resistenciaTeóricaNum) && resistencia < resistenciaTeóricaNum) {{
                                              td.classList.add('yellow-bg');
                                          }} else {{
                                              td.classList.add('green-bg');
                                          }}
                                      }} else {{
                                          td.classList.add('green-bg');
                                      }}
                                  }}

                                  // Colorear en amarillo "Cilindro N°" si Resistencia Teórica (MPa) > Resistencia (MPa)
                                  if (header === 'Cilindro N°' && valor !== '') {{
                                      const resistencia = row['Resistencia (MPa)'];
