name: 📊 Generar Dashboard

on:
  workflow_dispatch:

jobs:
  generar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install pandas openpyxl

      - name: 📊 Generar HTML desde Consolidado.xlsx
        run: |
          python << 'PYTHON_SCRIPT'
          import pandas as pd
          import os
          from datetime import datetime

          archivo_consolidado = "desplegable/Consolidado.xlsx"
          archivo_html = "index.html"

          if not os.path.exists(archivo_consolidado):
              print(f'[!] El archivo {archivo_consolidado} no existe')
              exit(1)

          print(f'[*] Leyendo: {archivo_consolidado}')
          df = pd.read_excel(archivo_consolidado)
          print(f'[+] Datos cargados: {len(df)} registros, {len(df.columns)} columnas')

          columnas = list(df.columns)
          num_registros = len(df)
          num_columnas = len(df.columns)
          fecha_generacion = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          print(f'[+] Columnas: {", ".join(columnas)}')

          # Obtener proyectos únicos
          proyectos = df['Proyecto'].unique().tolist() if 'Proyecto' in df.columns else []
          proyectos_sorted = sorted([p for p in proyectos if pd.notna(p)])

          # Convertir DataFrame a JSON
          datos_json = df.to_json(orient='records')

          # Generar opciones del datalist
          opciones_html = ''
          for proyecto in proyectos_sorted:
              opciones_html += f'<option value="{proyecto}"></option>'

          html = f"""<!DOCTYPE html>
          <html class="light" lang="es">
          <head>
              <meta charset="utf-8">
              <meta content="width=device-width, initial-scale=1.0" name="viewport">
              <title>Consolidado de Resistencias</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
              <style>
                  body {{ background-color: #ffffff; color: #141311; margin: 0; padding: 24px; font-family: 'Inter', sans-serif; }}
                  .container {{ max-width: 1440px; margin: 0 auto; }}
                  .selector-section {{ margin-bottom: 32px; }}
                  .selector-label {{ font-size: 12px; color: #4B4F1D; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 8px; display: block; }}
                  .selector-dropdown {{ width: 100%; padding: 12px 16px; border: 2px solid #A3C610; background-color: #ffffff; color: #141311; border-radius: 4px; font-size: 16px; cursor: pointer; font-family: 'Inter', sans-serif; }}
                  .selector-dropdown:hover {{ background-color: #f8f8f7; }}
                  .selector-dropdown:focus {{ outline: none; border-color: #4B4F1D; background-color: #fffdf8; }}
                  .filters-row {{ display: flex; gap: 24px; margin-bottom: 32px; }}
                  .filters-row .selector-section {{ margin-bottom: 0; flex: 1; }}
                  .filters-row .selector-dropdown {{ width: 100%; }}
                  .table-section {{ display: none; }}
                  .table-section.active {{ display: block; }}
                  table {{ border-collapse: collapse; width: 100%; }}
                  table th {{ background-color: #4B4F1D; color: #ffffff; padding: 12px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; }}
                  table td {{ padding: 12px; border-bottom: 1px solid #e5e2dd; }}
                  table tr:hover {{ background-color: #f8f8f7; }}
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="selector-section">
                      <label class="selector-label">Seleccione el proyecto</label>
                      <input type="text" id="proyectoInput" class="selector-dropdown" placeholder="Buscar proyecto..." list="proyectoList" autocomplete="off" />
                      <datalist id="proyectoList">
                          {opciones_html}
                      </datalist>
                  </div>
                  <div id="filtersRow" class="filters-row" style="display: none; opacity: 0;">
                      <div id="cilindroSection" class="selector-section">
                          <label class="selector-label">Cilindro N°</label>
                          <select id="cilindroSelector" class="selector-dropdown">
                          </select>
                      </div>
                      <div id="localizacionSection" class="selector-section">
                          <label class="selector-label">Localización</label>
                          <select id="localizacionSelector" class="selector-dropdown">
                          </select>
                      </div>
                      <div id="tomaSection" class="selector-section">
                          <label class="selector-label">Toma</label>
                          <select id="tomaSelector" class="selector-dropdown">
                          </select>
                      </div>
                  </div>
                  <div id="tableSection" class="table-section">
                      <table id="dataTable">
                          <thead></thead>
                          <tbody></tbody>
                      </table>
                  </div>
              </div>

              <script>
                  const datosCompletos = {datos_json};
                  const proyectoInput = document.getElementById('proyectoInput');
                  const selectorCilindro = document.getElementById('cilindroSelector');
                  const selectorLocalizacion = document.getElementById('localizacionSelector');
                  const selectorToma = document.getElementById('tomaSelector');
                  const filtersRow = document.getElementById('filtersRow');
                  const tableSection = document.getElementById('tableSection');
                  const dataTable = document.getElementById('dataTable');

                  let datosFiltrados = [];
                  const proyectos = [...new Set(datosCompletos.map(row => row['Proyecto']))].filter(p => p).sort();

                  // Función para formatear fechas
                  function formatearFecha(valor) {{
                      if (!valor) return '';

                      // Si es un timestamp de pandas (número)
                      if (typeof valor === 'number') {{
                          const fecha = new Date(valor);
                          const d = String(fecha.getDate()).padStart(2, '0');
                          const m = String(fecha.getMonth() + 1).padStart(2, '0');
                          const y = fecha.getFullYear();
                          return d + '-' + m + '-' + y;
                      }}

                      // Si es una cadena de texto (ISO format o similar)
                      if (typeof valor === 'string') {{
                          try {{
                              const fecha = new Date(valor);
                              if (!isNaN(fecha.getTime())) {{
                                  const d = String(fecha.getDate()).padStart(2, '0');
                                  const m = String(fecha.getMonth() + 1).padStart(2, '0');
                                  const y = fecha.getFullYear();
                                  return d + '-' + m + '-' + y;
                              }}
                          }} catch (e) {{
                              return valor;
                          }}
                      }}

                      return valor;
                  }}

                  function generarTabla(datos) {{
                      if (datos.length > 0) {{
                          const thead = dataTable.querySelector('thead');
                          const tbody = dataTable.querySelector('tbody');

                          // Limpiar tabla
                          thead.innerHTML = '';
                          tbody.innerHTML = '';

                          // Generar encabezados
                          const headers = Object.keys(datos[0]);
                          const headerRow = document.createElement('tr');
                          headers.forEach(header => {{
                              const th = document.createElement('th');
                              th.textContent = header;
                              headerRow.appendChild(th);
                          }});
                          thead.appendChild(headerRow);

                          // Generar filas de datos
                          datos.forEach(row => {{
                              const tr = document.createElement('tr');
                              headers.forEach(header => {{
                                  const td = document.createElement('td');
                                  let valor = row[header] !== null ? row[header] : '';

                                  // Formatear fechas para columnas específicas
                                  if ((header === 'Rotura' || header === 'Toma') && valor !== '') {{
                                      valor = formatearFecha(valor);
                                  }}

                                  td.textContent = valor;
                                  tr.appendChild(td);
                              }});
                              tbody.appendChild(tr);
                          }});

                          tableSection.classList.add('active');
                      }}
                  }}

                  function actualizarFiltros() {{
                      const cilindro = selectorCilindro.value;
                      const localizacion = selectorLocalizacion.value;
                      const toma = selectorToma.value;

                      let datosTemp = datosFiltrados;

                      if (cilindro) {{
                          datosTemp = datosTemp.filter(row => row['Cilindro N°'] === cilindro);
                      }}
                      if (localizacion) {{
                          datosTemp = datosTemp.filter(row => row['Localización'] === localizacion);
                      }}
                      if (toma) {{
                          datosTemp = datosTemp.filter(row => row['Toma'] === toma);
                      }}

                      generarTabla(datosTemp);
                  }}

                  function mostrarFiltrosConDelay() {{
                      // Mostrar fila de filtros con fade-in
                      filtersRow.style.opacity = '0';
                      filtersRow.style.display = 'flex';
                      setTimeout(() => {{
                          filtersRow.style.transition = 'opacity 1500ms ease-in-out';
                          filtersRow.style.opacity = '1';
                      }}, 0);
                  }}

                  proyectoInput.addEventListener('input', function() {{
                      const valor = this.value.trim();

                      if (!valor || !proyectos.includes(valor)) {{
                          tableSection.classList.remove('active');
                          filtersRow.style.display = 'none';
                          return;
                      }}

                      // Filtrar por proyecto
                      datosFiltrados = datosCompletos.filter(row => row['Proyecto'] === valor);

                      // Obtener valores únicos para cada filtro
                      const cilindros = [...new Set(datosFiltrados.map(row => row['Cilindro N°']))].filter(c => c).sort();
                      const localizaciones = [...new Set(datosFiltrados.map(row => row['Localización']))].filter(l => l).sort();
                      const tomas = [...new Set(datosFiltrados.map(row => row['Toma']))].filter(t => t).sort();

                      // Llenar dropdowns
                      selectorCilindro.innerHTML = '<option value="">-- Todos los cilindros --</option>';
                      cilindros.forEach(cilindro => {{
                          const option = document.createElement('option');
                          option.value = cilindro;
                          option.textContent = cilindro;
                          selectorCilindro.appendChild(option);
                      }});

                      selectorLocalizacion.innerHTML = '<option value="">-- Todas las localizaciones --</option>';
                      localizaciones.forEach(localizacion => {{
                          const option = document.createElement('option');
                          option.value = localizacion;
                          option.textContent = localizacion;
                          selectorLocalizacion.appendChild(option);
                      }});

                      selectorToma.innerHTML = '<option value="">-- Todas las tomas --</option>';
                      tomas.forEach(toma => {{
                          const option = document.createElement('option');
                          option.value = toma;
                          option.textContent = toma;
                          selectorToma.appendChild(option);
                      }});

                      // Generar tabla
                      generarTabla(datosFiltrados);

                      // Mostrar filtros con delay
                      mostrarFiltrosConDelay();

                      // Resetear selectores
                      selectorCilindro.value = '';
                      selectorLocalizacion.value = '';
                      selectorToma.value = '';
                  }});

                  // Listeners para cambios en filtros secundarios
                  selectorCilindro.addEventListener('change', actualizarFiltros);
                  selectorLocalizacion.addEventListener('change', actualizarFiltros);
                  selectorToma.addEventListener('change', actualizarFiltros);
              </script>
          </body>
          </html>"""

          with open(archivo_html, 'w', encoding='utf-8') as f:
              f.write(html)

          print(f'[+] ✅ HTML generado: {archivo_html}')
          PYTHON_SCRIPT

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add index.html

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Generar Dashboard - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== DASHBOARD GENERADO ==="
          echo ""
          echo "📄 Archivo generado:"
          ls -lh index.html 2>/dev/null || echo "No hay archivo"
