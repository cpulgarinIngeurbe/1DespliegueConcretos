name: 📊 Generar Dashboard

on:
  workflow_dispatch:

jobs:
  generar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install pandas openpyxl

      - name: 📊 Generar HTML desde Consolidado.xlsx
        run: |
          python << 'EOF'
          import pandas as pd
          import os
          from datetime import datetime

          archivo_consolidado = "desplegable/Consolidado.xlsx"
          archivo_html = "desplegable/dashboard.html"

          # Verificar que el archivo existe
          if not os.path.exists(archivo_consolidado):
              print(f'[!] El archivo {archivo_consolidado} no existe')
              exit(1)

          # Leer el Excel
          print(f'[*] Leyendo: {archivo_consolidado}')
          df = pd.read_excel(archivo_consolidado)
          print(f'[+] ✅ Datos cargados: {len(df)} registros, {len(df.columns)} columnas')

          # Obtener información del DataFrame
          columnas = list(df.columns)
          num_registros = len(df)
          num_columnas = len(df.columns)
          fecha_generacion = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          print(f'[+] Columnas: {", ".join(columnas)}')

          # Generar tabla HTML
          tabla_html = df.head(100).to_html(
              classes='w-full border-collapse',
              index=False,
              justify='center'
          )

          # Generar opciones de columnas para filtro
          columnas_opciones = ''.join([f'<option value="{col}">{col}</option>' for col in columnas])

          # Generar estadísticas por columna
          stats_html = ''
          for col in columnas[:5]:  # Mostrar solo las primeras 5 columnas en estadísticas
              if pd.api.types.is_numeric_dtype(df[col]):
                  stats_html += f'''
                  <div class="glass-card-light p-4 rounded-lg border border-accent-active/20">
                      <h3 class="font-label-sm text-accent-active uppercase tracking-wider mb-3">{col}</h3>
                      <div class="space-y-1 text-sm">
                          <p><span class="text-secondary font-semibold">Media:</span> {df[col].mean():.2f}</p>
                          <p><span class="text-secondary font-semibold">Máximo:</span> {df[col].max():.2f}</p>
                          <p><span class="text-secondary font-semibold">Mínimo:</span> {df[col].min():.2f}</p>
                      </div>
                  </div>
                  '''

          # Crear HTML completo
          html_content = f'''<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Dashboard - Consolidado de Resistencias</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {{
            darkMode: "class",
            theme: {{
                extend: {{
                    "colors": {{
                        "accent-active": "#A3C610",
                        "secondary": "#4B4F1D",
                        "on-surface": "#141311",
                        "on-surface-variant": "#47473e",
                        "surface-variant": "#e5e2dd",
                        "surface": "#ffffff",
                        "surface-container": "#f1f1ef",
                        "surface-container-lowest": "#ffffff"
                    }},
                    "borderRadius": {{
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }},
                    "spacing": {{
                        "stack-md": "24px",
                        "stack-lg": "48px",
                        "gutter": "24px",
                        "margin-desktop": "64px"
                    }},
                    "fontFamily": {{
                        "body-md": ["Inter"],
                        "label-sm": ["JetBrains Mono"],
                        "headline-lg": ["Inter"]
                    }},
                    "fontSize": {{
                        "headline-lg": ["32px", {{"lineHeight": "1.2", "fontWeight": "500"}}],
                        "body-md": ["16px", {{"lineHeight": "1.6", "fontWeight": "400"}}],
                        "label-sm": ["12px", {{"lineHeight": "1.5", "fontWeight": "500"}}]
                    }}
                }}
            }}
        }}
    </script>
    <style>
        body {{
            background-color: #ffffff;
            color: #141311;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }}
        .glass-card-light {{
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid #E7E9C1;
        }}
        .pulse-node {{
            animation: pulseGlow 2s infinite ease-in-out;
        }}
        @keyframes pulseGlow {{
            0%, 100% {{
                filter: drop-shadow(0 0 8px rgba(163, 198, 16, 0.4));
                box-shadow: 0 0 20px rgba(163, 198, 16, 0.35);
            }}
            50% {{
                filter: drop-shadow(0 0 15px rgba(163, 198, 16, 0.6));
                box-shadow: 0 0 35px rgba(163, 198, 16, 0.55);
            }}
        }}
        table {{
            border-collapse: collapse;
        }}
        table th {{
            background-color: #4B4F1D;
            color: #ffffff;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }}
        table td {{
            padding: 12px;
            border-bottom: 1px solid #e5e2dd;
        }}
        table tr:hover {{
            background-color: #f8f8f7;
        }}
    </style>
</head>
<body class="font-body-md" style="background: #ffffff; color: #141311;">
    <nav class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-desktop py-6 bg-white/80 backdrop-blur-xl border-b border-black/5">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-accent-active text-3xl">dashboard</span>
            <div>
                <h1 class="font-headline-lg text-secondary">Dashboard</h1>
                <p class="text-sm text-on-surface-variant">Consolidado de Resistencias</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-accent-active">schedule</span>
            <span class="text-sm text-on-surface-variant">{fecha_generacion}</span>
        </div>
    </nav>

    <main class="pt-24 px-margin-desktop pb-stack-lg">
        <div class="max-w-7xl mx-auto">
            <!-- Resumen -->
            <section class="mb-stack-lg">
                <h2 class="font-headline-lg text-secondary mb-6 border-l-4 border-accent-active pl-4">Resumen de Datos</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-gutter">
                    <div class="glass-card-light p-6 rounded-lg border border-accent-active/20 pulse-node">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-label-sm text-accent-active uppercase tracking-wider">Total Registros</h3>
                            <span class="material-symbols-outlined text-accent-active text-2xl">dataset</span>
                        </div>
                        <p class="text-3xl font-bold text-secondary">{num_registros}</p>
                    </div>
                    <div class="glass-card-light p-6 rounded-lg border border-accent-active/20">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-label-sm text-secondary uppercase tracking-wider">Columnas</h3>
                            <span class="material-symbols-outlined text-accent-active text-2xl">table_chart</span>
                        </div>
                        <p class="text-3xl font-bold text-secondary">{num_columnas}</p>
                    </div>
                    <div class="glass-card-light p-6 rounded-lg border border-accent-active/20">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-label-sm text-secondary uppercase tracking-wider">Fuente</h3>
                            <span class="material-symbols-outlined text-accent-active text-2xl">description</span>
                        </div>
                        <p class="text-sm text-secondary">Consolidado.xlsx</p>
                    </div>
                    <div class="glass-card-light p-6 rounded-lg border border-accent-active/20">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-label-sm text-secondary uppercase tracking-wider">Generado</h3>
                            <span class="material-symbols-outlined text-accent-active text-2xl">schedule</span>
                        </div>
                        <p class="text-xs text-secondary">{fecha_generacion}</p>
                    </div>
                </div>
            </section>

            <!-- Estadísticas -->
            <section class="mb-stack-lg">
                <h2 class="font-headline-lg text-secondary mb-6 border-l-4 border-accent-active pl-4">Estadísticas</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
                    {stats_html}
                </div>
            </section>

            <!-- Datos Tabla -->
            <section>
                <h2 class="font-headline-lg text-secondary mb-6 border-l-4 border-accent-active pl-4">Datos (Primeros 100 registros)</h2>
                <div class="glass-card-light p-6 rounded-lg border border-accent-active/20 overflow-x-auto">
                    {tabla_html}
                </div>
            </section>
        </div>
    </main>

    <script>
        // Interactividad simple
        document.addEventListener('DOMContentLoaded', () => {{
            console.log('[+] Dashboard cargado exitosamente');
            console.log('[+] Total de registros:', {num_registros});
        }});
    </script>
</body>
</html>'''

          # Guardar HTML
          with open(archivo_html, 'w', encoding='utf-8') as f:
              f.write(html_content)

          print(f'[+] ✅ HTML generado: {archivo_html}')
          print(f'[+] Dashboard disponible en desplegable/dashboard.html')

          EOF

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add desplegable/dashboard.html

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Generar Dashboard - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== DASHBOARD GENERADO ==="
          echo ""
          echo "📄 Archivo generado:"
          ls -lh desplegable/dashboard.html 2>/dev/null || echo "No hay archivo"
