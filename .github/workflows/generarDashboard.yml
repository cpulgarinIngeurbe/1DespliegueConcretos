                                  // Colorear en rojo "Resistencia Mínima (MPa)" si es mayor o igual a "Resistencia (MPa)"
                                  if (header === 'Resistencia Mínima (MPa)' && valor !== '') {{
                                      const resistenciaMinima = parseFloat(valor);
                                      const resistencia = row['Resistencia (MPa)'];
                                      if (!isNaN(resistenciaMinima) && resistencia !== null && resistencia !== undefined) {{
                                          const resistenciaNum = parseFloat(resistencia);
                                          if (!isNaN(resistenciaNum) && resistenciaMinima >= resistenciaNum) {{
                                              td.classList.add('red-negative');
