                  // Función simplificada para cambiar pestaña (solo visualización)
                  function cambiarPestana(nombrePestana) {{
                      // Cambiar visualización de pestañas
                      tabContents.forEach(tab => tab.classList.remove('active'));
                      tabButtons.forEach(btn => btn.classList.remove('active'));

                      document.getElementById(nombrePestana).classList.add('active');
                      document.querySelector('[data-tab="' + nombrePestana + '"]').classList.add('active');

                      // Generar tabla vacía según la pestaña activa
                      if (nombrePestana === 'consolidado') {{
                          generarTabla([], true, datosConsolidado);
                      }} else if (nombrePestana === 'alertas') {{
                          generarTablaAlertas([], datosAlertas);
                      }} else if (nombrePestana === 'incumplimientos') {{
                          generarTablaIncumplimientos([], datosIncumplimientos);
                      }}
                  }}

                  // Listeners para cambio de pestaña
                  tabButtons.forEach(btn => {{
                      btn.addEventListener('click', () => cambiarPestana(btn.dataset.tab));
                  }});

                  // Listeners para botones de filtro
                  filterBtnConsolidado.addEventListener('click', () => {{
                      filterDropdownConsolidado.classList.toggle('open');
                      filterDropdownAlertas.classList.remove('open');
                      filterDropdownIncumplimientos.classList.remove('open');
                  }});

                  filterBtnAlertas.addEventListener('click', () => {{
                      filterDropdownAlertas.classList.toggle('open');
                      filterDropdownConsolidado.classList.remove('open');
                      filterDropdownIncumplimientos.classList.remove('open');
                  }});

                  filterBtnIncumplimientos.addEventListener('click', () => {{
                      filterDropdownIncumplimientos.classList.toggle('open');
                      filterDropdownConsolidado.classList.remove('open');
                      filterDropdownAlertas.classList.remove('open');
                  }});

                  // Cerrar dropdown al hacer click fuera
                  document.addEventListener('click', (e) => {{
                      if (!e.target.closest('.filter-section')) {{
                          filterDropdownConsolidado.classList.remove('open');
                          filterDropdownAlertas.classList.remove('open');
                          filterDropdownIncumplimientos.classList.remove('open');
                      }}
                  }});

                  // Inicializar al cargar
                  window.addEventListener('load', () => {{
                      // Generar tablas vacías con encabezados al inicio
                      generarTabla([], true, datosConsolidado);
                      generarTablaAlertas([], datosAlertas);
                      generarTablaIncumplimientos([], datosIncumplimientos);

                      // Llenar dropdowns con proyectos
                      llenarDropdown(filterDropdownConsolidado, obtenerProyectosUnicos(datosConsolidado), () => {{
                          proyectosSeleccionadosConsolidado = Array.from(filterDropdownConsolidado.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
                          actualizarTags(filterTagsConsolidado, proyectosSeleccionadosConsolidado, (proyecto) => {{
                              const checkbox = filterDropdownConsolidado.querySelector('input[value="' + proyecto + '"]');
                              if (checkbox) checkbox.checked = false;
                              proyectosSeleccionadosConsolidado = proyectosSeleccionadosConsolidado.filter(p => p !== proyecto);
                              actualizarTags(filterTagsConsolidado, proyectosSeleccionadosConsolidado, arguments.callee);
                              const datosFiltrados = filtrarPorProyectos(datosConsolidado, proyectosSeleccionadosConsolidado);
                              generarTabla(datosFiltrados, false, datosConsolidado);
                          }});
                          const datosFiltrados = filtrarPorProyectos(datosConsolidado, proyectosSeleccionadosConsolidado);
                          generarTabla(datosFiltrados, false, datosConsolidado);
                      }});

                      llenarDropdown(filterDropdownAlertas, obtenerProyectosUnicos(datosAlertas), () => {{
                          proyectosSeleccionadosAlertas = Array.from(filterDropdownAlertas.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
                          actualizarTags(filterTagsAlertas, proyectosSeleccionadosAlertas, (proyecto) => {{
                              const checkbox = filterDropdownAlertas.querySelector('input[value="' + proyecto + '"]');
                              if (checkbox) checkbox.checked = false;
                              proyectosSeleccionadosAlertas = proyectosSeleccionadosAlertas.filter(p => p !== proyecto);
                              actualizarTags(filterTagsAlertas, proyectosSeleccionadosAlertas, arguments.callee);
                              const datosFiltrados = filtrarPorProyectos(datosAlertas, proyectosSeleccionadosAlertas);
                              generarTablaAlertas(datosFiltrados, datosAlertas);
                          }});
                          const datosFiltrados = filtrarPorProyectos(datosAlertas, proyectosSeleccionadosAlertas);
                          generarTablaAlertas(datosFiltrados, datosAlertas);
                      }});

                      llenarDropdown(filterDropdownIncumplimientos, obtenerProyectosUnicos(datosIncumplimientos), () => {{
                          proyectosSeleccionadosIncumplimientos = Array.from(filterDropdownIncumplimientos.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
                          actualizarTags(filterTagsIncumplimientos, proyectosSeleccionadosIncumplimientos, (proyecto) => {{
                              const checkbox = filterDropdownIncumplimientos.querySelector('input[value="' + proyecto + '"]');
                              if (checkbox) checkbox.checked = false;
                              proyectosSeleccionadosIncumplimientos = proyectosSeleccionadosIncumplimientos.filter(p => p !== proyecto);
                              actualizarTags(filterTagsIncumplimientos, proyectosSeleccionadosIncumplimientos, arguments.callee);
                              const datosFiltrados = filtrarPorProyectos(datosIncumplimientos, proyectosSeleccionadosIncumplimientos);
                              generarTablaIncumplimientos(datosFiltrados, datosIncumplimientos);
