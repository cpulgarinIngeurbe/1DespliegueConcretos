name: 📊 Generar Dashboard

on:
  workflow_dispatch:

jobs:
  generar-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install pandas openpyxl

      - name: 📊 Generar Dashboard con 3 Pestañas
        run: |
          python << 'PYTHON_SCRIPT'
          import pandas as pd
          import os
          from datetime import datetime

          archivo_consolidado = "desplegable/Consolidado.xlsx"
          archivo_alertas = "desplegable/ConsolidadoAlertas.xlsx"
          archivo_incumplimientos = "desplegable/Incumplimientos.xlsx"
          archivo_html = "index.html"

          datos_tabs = {}
          proyectos_consolidado = []

          # Leer Consolidado.xlsx
          if os.path.exists(archivo_consolidado):
              print(f'[*] Leyendo: {archivo_consolidado}')
              df_consolidado = pd.read_excel(archivo_consolidado)
              datos_tabs['consolidado'] = df_consolidado.to_json(orient='records')
              proyectos_consolidado = sorted([p for p in df_consolidado['Proyecto'].unique().tolist() if pd.notna(p)])
              print(f'[+] Consolidado cargado: {len(df_consolidado)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_consolidado}')
              datos_tabs['consolidado'] = '[]'

          # Leer ConsolidadoAlertas.xlsx
          if os.path.exists(archivo_alertas):
              print(f'[*] Leyendo: {archivo_alertas}')
              df_alertas = pd.read_excel(archivo_alertas)
              datos_tabs['alertas'] = df_alertas.to_json(orient='records')
              print(f'[+] Control 28 días cargado: {len(df_alertas)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_alertas}')
              datos_tabs['alertas'] = '[]'

          # Leer Incumplimientos.xlsx
          if os.path.exists(archivo_incumplimientos):
              print(f'[*] Leyendo: {archivo_incumplimientos}')
              df_incumplimientos = pd.read_excel(archivo_incumplimientos)
              datos_tabs['incumplimientos'] = df_incumplimientos.to_json(orient='records')
              print(f'[+] Incumplimientos cargado: {len(df_incumplimientos)} registros')
          else:
              print(f'[!] Archivo no encontrado: {archivo_incumplimientos}')
              datos_tabs['incumplimientos'] = '[]'

          # Generar opciones del datalist
          opciones_html = ''
          for proyecto in proyectos_consolidado:
              opciones_html += f'<option value="{proyecto}"></option>'

          html = f"""<!DOCTYPE html>
          <html class="light" lang="es">
          <head>
              <meta charset="utf-8">
              <meta content="width=device-width, initial-scale=1.0" name="viewport">
              <title>Dashboard de Resistencias</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
              <style>
                  body {{ background-color: #ffffff; color: #141311; margin: 0; padding: 24px; font-family: 'Inter', sans-serif; }}
                  .container {{ max-width: 1440px; margin: 0 auto; }}
                  .tabs-container {{ display: flex; gap: 8px; margin-bottom: 32px; border-bottom: 2px solid #A3C610; }}
                  .tab-button {{ padding: 12px 24px; background-color: transparent; border: none; color: #4B4F1D; font-weight: 600; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 3px solid transparent; transition: all 0.3s ease; }}
                  .tab-button:hover {{ color: #A3C610; }}
                  .tab-button.active {{ color: #A3C610; border-bottom-color: #A3C610; }}
                  .tab-content {{ display: none; }}
                  .tab-content.active {{ display: block; }}
                  .selector-section {{ margin-bottom: 32px; }}
                  .selector-label {{ font-size: 12px; color: #4B4F1D; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 8px; display: block; }}
                  .selector-dropdown {{ width: 100%; padding: 12px 16px; border: 2px solid #A3C610; background-color: #ffffff; color: #141311; border-radius: 4px; font-size: 16px; cursor: pointer; font-family: 'Inter', sans-serif; }}
                  .selector-dropdown:hover {{ background-color: #f8f8f7; }}
                  .selector-dropdown:focus {{ outline: none; border-color: #4B4F1D; background-color: #fffdf8; }}
                  .proyecto-input-row {{ display: flex; gap: 12px; align-items: flex-end; margin-bottom: 32px; }}
                  .proyecto-input-wrapper {{ flex: 0 1 auto; width: 65%; }}
                  .proyecto-input-wrapper .selector-label {{ margin-bottom: 8px; }}
                  .proyecto-input-wrapper input {{ width: 100%; }}
                  .btn-reset {{ padding: 12px 24px; border: 2px solid #A3C610; background-color: #4B4F1D; color: #A3C610; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.3s ease; }}
                  .btn-reset:hover {{ background-color: #3d401a; border-color: #A3C610; }}
                  .btn-reset:active {{ background-color: #2f3215; }}
                  .filters-row {{ display: flex; gap: 24px; margin-bottom: 32px; }}
                  .filters-row .selector-section {{ margin-bottom: 0; flex: 1; }}
                  .filters-row .selector-dropdown {{ width: 100%; }}
                  .table-section {{ display: none; opacity: 0; }}
                  .table-section.active {{ display: block; transition: opacity 1500ms ease-in-out; opacity: 1; }}
                  table {{ border-collapse: collapse; width: 100%; }}
                  table th {{ background-color: #4B4F1D; color: #ffffff; padding: 12px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; }}
                  table td {{ padding: 12px; border-bottom: 1px solid #e5e2dd; }}
                  table tr:hover {{ background-color: #f8f8f7; }}
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="tabs-container">
                      <button class="tab-button active" data-tab="consolidado">Consolidado</button>
                      <button class="tab-button" data-tab="alertas">Control 28 Días</button>
                      <button class="tab-button" data-tab="incumplimientos">Alertas Incumplimientos</button>
                  </div>

                  <div id="consolidado" class="tab-content active">
                      <div class="proyecto-input-row">
                          <div class="proyecto-input-wrapper">
                              <label class="selector-label">Seleccione el proyecto</label>
                              <input type="text" id="proyectoInputConsolidado" class="selector-dropdown" placeholder="Buscar proyecto..." list="proyectoListConsolidado" autocomplete="off" />
                              <datalist id="proyectoListConsolidado">
                                  {opciones_html}
                              </datalist>
                          </div>
                          <button id="btnResetConsolidado" class="btn-reset">Restaurar</button>
                      </div>
                      <div id="filtersRowConsolidado" class="filters-row" style="display: none; opacity: 0;">
                          <div id="cilindroSectionConsolidado" class="selector-section">
                              <label class="selector-label">Cilindro N°</label>
                              <select id="cilindroSelectorConsolidado" class="selector-dropdown"></select>
                          </div>
                          <div id="localizacionSectionConsolidado" class="selector-section">
                              <label class="selector-label">Localización</label>
                              <select id="localizacionSelectorConsolidado" class="selector-dropdown"></select>
                          </div>
                          <div id="tomaSectionConsolidado" class="selector-section">
                              <label class="selector-label">Toma</label>
                              <select id="tomaSelectorConsolidado" class="selector-dropdown"></select>
                          </div>
                      </div>
                      <div id="tableSectionConsolidado" class="table-section">
                          <table id="dataTableConsolidado">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>

                  <div id="alertas" class="tab-content">
                      <div class="proyecto-input-row">
                          <div class="proyecto-input-wrapper">
                              <label class="selector-label">Seleccione el proyecto</label>
                              <input type="text" id="proyectoInputAlertas" class="selector-dropdown" placeholder="Buscar proyecto..." list="proyectoListAlertas" autocomplete="off" />
                              <datalist id="proyectoListAlertas">
                                  {opciones_html}
                              </datalist>
                          </div>
                          <button id="btnResetAlertas" class="btn-reset">Restaurar</button>
                      </div>
                      <div id="filtersRowAlertas" class="filters-row" style="display: none; opacity: 0;">
                          <div id="cilindroSectionAlertas" class="selector-section">
                              <label class="selector-label">Cilindro N°</label>
                              <select id="cilindroSelectorAlertas" class="selector-dropdown"></select>
                          </div>
                          <div id="localizacionSectionAlertas" class="selector-section">
                              <label class="selector-label">Localización</label>
                              <select id="localizacionSelectorAlertas" class="selector-dropdown"></select>
                          </div>
                          <div id="tomaSectionAlertas" class="selector-section">
                              <label class="selector-label">Toma</label>
                              <select id="tomaSelectorAlertas" class="selector-dropdown"></select>
                          </div>
                      </div>
                      <div id="tableSectionAlertas" class="table-section">
                          <table id="dataTableAlertas">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>

                  <div id="incumplimientos" class="tab-content">
                      <div class="proyecto-input-row">
                          <div class="proyecto-input-wrapper">
                              <label class="selector-label">Seleccione el proyecto</label>
                              <input type="text" id="proyectoInputIncumplimientos" class="selector-dropdown" placeholder="Buscar proyecto..." list="proyectoListIncumplimientos" autocomplete="off" />
                              <datalist id="proyectoListIncumplimientos">
                                  {opciones_html}
                              </datalist>
                          </div>
                          <button id="btnResetIncumplimientos" class="btn-reset">Restaurar</button>
                      </div>
                      <div id="filtersRowIncumplimientos" class="filters-row" style="display: none; opacity: 0;">
                          <div id="cilindroSectionIncumplimientos" class="selector-section">
                              <label class="selector-label">Cilindro N°</label>
                              <select id="cilindroSelectorIncumplimientos" class="selector-dropdown"></select>
                          </div>
                          <div id="localizacionSectionIncumplimientos" class="selector-section">
                              <label class="selector-label">Localización</label>
                              <select id="localizacionSelectorIncumplimientos" class="selector-dropdown"></select>
                          </div>
                          <div id="tomaSectionIncumplimientos" class="selector-section">
                              <label class="selector-label">Toma</label>
                              <select id="tomaSelectorIncumplimientos" class="selector-dropdown"></select>
                          </div>
                      </div>
                      <div id="tableSectionIncumplimientos" class="table-section">
                          <table id="dataTableIncumplimientos">
                              <thead></thead>
                              <tbody></tbody>
                          </table>
                      </div>
                  </div>
              </div>

              <script>
                  const datosConsolidado = {datos_tabs['consolidado']};
                  const datosAlertas = {datos_tabs['alertas']};
                  const datosIncumplimientos = {datos_tabs['incumplimientos']};
                  // Elementos de la pestaña Consolidado
                  const proyectoInput = document.getElementById('proyectoInputConsolidado');
                  const selectorCilindro = document.getElementById('cilindroSelectorConsolidado');
                  const selectorLocalizacion = document.getElementById('localizacionSelectorConsolidado');
                  const selectorToma = document.getElementById('tomaSelectorConsolidado');
                  const filtersRow = document.getElementById('filtersRowConsolidado');
                  const tableSection = document.getElementById('tableSectionConsolidado');
                  const dataTable = document.getElementById('dataTableConsolidado');
                  const btnReset = document.getElementById('btnResetConsolidado');

                  // Elementos de pestañas
                  const tabButtons = document.querySelectorAll('.tab-button');
                  const tabContents = document.querySelectorAll('.tab-content');


                  // Configuración para cada pestaña
                  const pestanaConfig = {{
                      consolidado: {{
                          datos: datosConsolidado,
                          input: document.getElementById('proyectoInputConsolidado'),
                          btnReset: document.getElementById('btnResetConsolidado'),
                          filtersRow: document.getElementById('filtersRowConsolidado'),
                          tableSection: document.getElementById('tableSectionConsolidado'),
                          dataTable: document.getElementById('dataTableConsolidado'),
                          cilindroSelector: document.getElementById('cilindroSelectorConsolidado'),
                          localizacionSelector: document.getElementById('localizacionSelectorConsolidado'),
                          tomaSelector: document.getElementById('tomaSelectorConsolidado')
                      }},
                      alertas: {{
                          datos: datosAlertas,
                          input: document.getElementById('proyectoInputAlertas'),
                          btnReset: document.getElementById('btnResetAlertas'),
                          filtersRow: document.getElementById('filtersRowAlertas'),
                          tableSection: document.getElementById('tableSectionAlertas'),
                          dataTable: document.getElementById('dataTableAlertas'),
                          cilindroSelector: document.getElementById('cilindroSelectorAlertas'),
                          localizacionSelector: document.getElementById('localizacionSelectorAlertas'),
                          tomaSelector: document.getElementById('tomaSelectorAlertas')
                      }},
                      incumplimientos: {{
                          datos: datosIncumplimientos,
                          input: document.getElementById('proyectoInputIncumplimientos'),
                          btnReset: document.getElementById('btnResetIncumplimientos'),
                          filtersRow: document.getElementById('filtersRowIncumplimientos'),
                          tableSection: document.getElementById('tableSectionIncumplimientos'),
                          dataTable: document.getElementById('dataTableIncumplimientos'),
                          cilindroSelector: document.getElementById('cilindroSelectorIncumplimientos'),
                          localizacionSelector: document.getElementById('localizacionSelectorIncumplimientos'),
                          tomaSelector: document.getElementById('tomaSelectorIncumplimientos')
                      }}
                  }};

                  let pestanaActiva = 'consolidado';
                  const estadoPestanas = {
                      consolidado: { datosFiltrados: [], tablaVisible: false },
                      alertas: { datosFiltrados: [], tablaVisible: false },
                      incumplimientos: { datosFiltrados: [], tablaVisible: false }
                  };

                  // Función para cambiar pestañas
                  function cambiarPestana(nombrePestana) {
                      tabContents.forEach(tab => tab.classList.remove('active'));
                      tabButtons.forEach(btn => btn.classList.remove('active'));

                      document.getElementById(nombrePestana).classList.add('active');
                      document.querySelector('[data-tab="' + nombrePestana + '"]').classList.add('active');

                      pestanaActiva = nombrePestana;
                  }

                  tabButtons.forEach(btn => {
                      btn.addEventListener('click', () => cambiarPestana(btn.dataset.tab));
                  });

                  function recalcularOpcionesFiltros(config) {
                      const cilindroSeleccionado = config.cilindroSelector.value;
                      const localizacionSeleccionada = config.localizacionSelector.value;
                      const tomaSeleccionada = config.tomaSelector.value;

                      let datosTemp = estadoPestanas[pestanaActiva].datosFiltrados;

                      if (cilindroSeleccionado) {
                          datosTemp = datosTemp.filter(row => row['Cilindro N°'] === cilindroSeleccionado);
                      }
                      if (localizacionSeleccionada) {
                          datosTemp = datosTemp.filter(row => row['Localización'] === localizacionSeleccionada);
                      }
                      if (tomaSeleccionada) {
                          datosTemp = datosTemp.filter(row => row['Toma'] === tomaSeleccionada);
                      }

                      const cilindrosDisponibles = [...new Set(datosTemp.map(row => row['Cilindro N°']))].filter(c => c).sort();
                      const localizacionesDisponibles = [...new Set(datosTemp.map(row => row['Localización']))].filter(l => l).sort();
                      const tomasDisponibles = [...new Set(datosTemp.map(row => row['Toma']))].filter(t => t).sort();

                      const cilindroActual = config.cilindroSelector.value;
                      config.cilindroSelector.innerHTML = '<option value="">-- Todos los cilindros --</option>';
                      cilindrosDisponibles.forEach(cilindro => {
                          const option = document.createElement('option');
                          option.value = cilindro;
                          option.textContent = cilindro;
                          config.cilindroSelector.appendChild(option);
                      });
                      config.cilindroSelector.value = cilindroActual;

                      const localizacionActual = config.localizacionSelector.value;
                      config.localizacionSelector.innerHTML = '<option value="">-- Todas las localizaciones --</option>';
                      localizacionesDisponibles.forEach(localizacion => {
                          const option = document.createElement('option');
                          option.value = localizacion;
                          option.textContent = localizacion;
                          config.localizacionSelector.appendChild(option);
                      });
                      config.localizacionSelector.value = localizacionActual;

                      const tomaActual = config.tomaSelector.value;
                      config.tomaSelector.innerHTML = '<option value="">-- Todas las tomas --</option>';
                      tomasDisponibles.forEach(toma => {
                          const option = document.createElement('option');
                          option.value = toma;
                          option.textContent = toma;
                          config.tomaSelector.appendChild(option);
                      });
                      config.tomaSelector.value = tomaActual;

                      actualizarFiltrosPestana(config);
                  }

                  // Función para formatear fechas
                  function formatearFecha(valor) {{
                      if (!valor) return '';

                      // Si es un timestamp de pandas (número)
                      if (typeof valor === 'number') {{
                          const fecha = new Date(valor);
                          const d = String(fecha.getDate()).padStart(2, '0');
                          const m = String(fecha.getMonth() + 1).padStart(2, '0');
                          const y = fecha.getFullYear();
                          return d + '-' + m + '-' + y;
                      }}

                      // Si es una cadena de texto (ISO format o similar)
                      if (typeof valor === 'string') {{
                          try {{
                              const fecha = new Date(valor);
                              if (!isNaN(fecha.getTime())) {{
                                  const d = String(fecha.getDate()).padStart(2, '0');
                                  const m = String(fecha.getMonth() + 1).padStart(2, '0');
                                  const y = fecha.getFullYear();
                                  return d + '-' + m + '-' + y;
                              }}
                          }} catch (e) {{
                              return valor;
                          }}
                      }}

                      return valor;
                  }}


                  function actualizarFiltrosPestana(config) {
                      const cilindro = config.cilindroSelector.value;
                      const localizacion = config.localizacionSelector.value;
                      const toma = config.tomaSelector.value;

                      let datosTemp = estadoPestanas[pestanaActiva].datosFiltrados;

                      if (cilindro) {
                          datosTemp = datosTemp.filter(row => row['Cilindro N°'] === cilindro);
                      }
                      if (localizacion) {
                          datosTemp = datosTemp.filter(row => row['Localización'] === localizacion);
                      }
                      if (toma) {
                          datosTemp = datosTemp.filter(row => row['Toma'] === toma);
                      }

                      generarTablaGeneral(datosTemp, config.dataTable);
                  }

                  function generarTablaGeneral(datos, tableElement) {
                      if (datos.length > 0) {
                          const thead = tableElement.querySelector('thead');
                          const tbody = tableElement.querySelector('tbody');

                          thead.innerHTML = '';
                          tbody.innerHTML = '';

                          const headers = Object.keys(datos[0]);
                          const headerRow = document.createElement('tr');
                          headers.forEach(header => {
                              const th = document.createElement('th');
                              th.textContent = header;
                              headerRow.appendChild(th);
                          });
                          thead.appendChild(headerRow);

                          datos.forEach(row => {
                              const tr = document.createElement('tr');
                              headers.forEach(header => {
                                  const td = document.createElement('td');
                                  let valor = row[header] !== null ? row[header] : '';

                                  if ((header === 'Rotura' || header === 'Toma' || header === 'Fecha Descarga' || header === 'Fecha Primera Aparición') && valor !== '') {
                                      valor = formatearFecha(valor);
                                  }

                                  td.textContent = valor;
                                  tr.appendChild(td);
                              });
                              tbody.appendChild(tr);
                          });

                          tableElement.parentElement.classList.add('active');
                      }
                  }

                  function mostrarFiltrosConDelay(config) {
                      config.filtersRow.style.opacity = '0';
                      config.filtersRow.style.display = 'flex';
                      setTimeout(() => {
                          config.filtersRow.style.transition = 'opacity 1500ms ease-in-out';
                          config.filtersRow.style.opacity = '1';
                      }, 0);
                  }

                  function inicializarPestana(nombrePestana) {
                      const config = pestanaConfig[nombrePestana];
                      const proyectosUnicos = [...new Set(config.datos.map(row => row['Proyecto']))].filter(p => p).sort();

                      config.input.addEventListener('input', function() {
                          const valor = this.value.trim();

                          if (!valor || !proyectosUnicos.includes(valor)) {
                              config.tableSection.classList.remove('active');
                              config.filtersRow.style.display = 'none';
                              return;
                          }

                          estadoPestanas[nombrePestana].datosFiltrados = config.datos.filter(row => row['Proyecto'] === valor);

                          config.cilindroSelector.value = '';
                          config.localizacionSelector.value = '';
                          config.tomaSelector.value = '';

                          const cilindros = [...new Set(estadoPestanas[nombrePestana].datosFiltrados.map(row => row['Cilindro N°']))].filter(c => c).sort();
                          const localizaciones = [...new Set(estadoPestanas[nombrePestana].datosFiltrados.map(row => row['Localización']))].filter(l => l).sort();
                          const tomas = [...new Set(estadoPestanas[nombrePestana].datosFiltrados.map(row => row['Toma']))].filter(t => t).sort();

                          config.cilindroSelector.innerHTML = '<option value="">-- Todos los cilindros --</option>';
                          cilindros.forEach(cilindro => {
                              const option = document.createElement('option');
                              option.value = cilindro;
                              option.textContent = cilindro;
                              config.cilindroSelector.appendChild(option);
                          });

                          config.localizacionSelector.innerHTML = '<option value="">-- Todas las localizaciones --</option>';
                          localizaciones.forEach(localizacion => {
                              const option = document.createElement('option');
                              option.value = localizacion;
                              option.textContent = localizacion;
                              config.localizacionSelector.appendChild(option);
                          });

                          config.tomaSelector.innerHTML = '<option value="">-- Todas las tomas --</option>';
                          tomas.forEach(toma => {
                              const option = document.createElement('option');
                              option.value = toma;
                              option.textContent = toma;
                              config.tomaSelector.appendChild(option);
                          });

                          mostrarFiltrosConDelay(config);
                          generarTablaGeneral(estadoPestanas[nombrePestana].datosFiltrados, config.dataTable);
                      });

                      config.cilindroSelector.addEventListener('change', () => recalcularOpcionesFiltros(config));
                      config.localizacionSelector.addEventListener('change', () => recalcularOpcionesFiltros(config));
                      config.tomaSelector.addEventListener('change', () => recalcularOpcionesFiltros(config));

                      config.btnReset.addEventListener('click', function() {
                          config.input.value = '';
                          config.cilindroSelector.value = '';
                          config.localizacionSelector.value = '';
                          config.tomaSelector.value = '';
                          config.filtersRow.style.display = 'none';
                          config.tableSection.classList.remove('active');
                          config.input.focus();
                      });
                  }

                  // Inicializar las 3 pestañas
                  inicializarPestana('consolidado');
                  inicializarPestana('alertas');
                  inicializarPestana('incumplimientos');
              </script>
          </body>
          </html>"""

          with open(archivo_html, 'w', encoding='utf-8') as f:
              f.write(html)

          print(f'[+] ✅ HTML generado: {archivo_html}')
          PYTHON_SCRIPT

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add index.html

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Generar Dashboard - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== DASHBOARD GENERADO ==="
          echo ""
          echo "📄 Archivo generado:"
          ls -lh index.html 2>/dev/null || echo "No hay archivo"
