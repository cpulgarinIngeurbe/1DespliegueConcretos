                          const option = document.createElement('option');
                          option.value = resistencia;
                          option.textContent = resistencia;
                          selectorResistenciaNominalIncumplimientos.appendChild(option);
                      }});
                      selectorResistenciaNominalIncumplimientos.value = resistenciaNominalActual;

                      actualizarTablaIncumplimientos();
                  }}

                  function actualizarTablaIncumplimientos() {{
                      const cilindro = selectorCilindroIncumplimientos.value;
                      const localizacion = selectorLocalizacionIncumplimientos.value;
                      const toma = selectorTomaIncumplimientos.value;
                      const resistenciaNominal = selectorResistenciaNominalIncumplimientos.value;

                      let datosTemp = datosFiltradosIncumplimientos;

                      if (cilindro) {{
                          datosTemp = datosTemp.filter(row => row['Cilindro N°'] === cilindro);
                      }}
                      if (localizacion) {{
                          datosTemp = datosTemp.filter(row => row['Localización'] === localizacion);
                      }}
                      if (toma) {{
                          datosTemp = datosTemp.filter(row => row['Toma'] === toma);
                      }}
                      if (resistenciaNominal) {{
                          datosTemp = datosTemp.filter(row => row['Resistencia nominal (MPa)'] == resistenciaNominal);
                      }}

                      generarTablaIncumplimientos(datosTemp);
                  }}

                  function generarTablaIncumplimientos(datos) {{
                      if (datos.length > 0) {{
                          const thead = dataTableIncumplimientos.querySelector('thead');
                          const tbody = dataTableIncumplimientos.querySelector('tbody');

                          thead.innerHTML = '';
                          tbody.innerHTML = '';

                          const headers = Object.keys(datos[0]);
                          const headerRow = document.createElement('tr');
                          headers.forEach(header => {{
                              const th = document.createElement('th');
                              th.textContent = header;
                              headerRow.appendChild(th);
                          }});
                          thead.appendChild(headerRow);

                          datos.forEach(row => {{
                              const tr = document.createElement('tr');
                              headers.forEach(header => {{
                                  const td = document.createElement('td');
                                  let valor = row[header] !== null ? row[header] : '';

                                  if ((header === 'Rotura' || header === 'Toma' || header === 'Fecha Descarga') && valor !== '') {{
                                      valor = formatearFecha(valor);
                                  }}

                                  // Formatear valores numéricos a 2 decimales para columnas específicas
                                  const columnasDecimales = ['Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia (%)', 'Resistencia nominal (MPa) llave', 'Resistencia Teórica (MPa)', 'Diferencia (MPa)', 'Resistencia Promedio (MPa)', 'Promedio Móvil (MPa)'];
                                  if (columnasDecimales.includes(header) && valor !== '') {{
                                      if (typeof valor === 'number' && !isNaN(valor)) {{
                                          valor = valor.toFixed(2);
                                      }} else if (typeof valor === 'string') {{
                                          const numValue = parseFloat(valor);
                                          if (!isNaN(numValue) && isFinite(numValue)) {{
                                              valor = numValue.toFixed(2);
                                          }}
                                      }}
                                  }}

                                  td.textContent = valor;

                                  // Colorear celdas negativas o cero en columna "Diferencia (MPa)"
                                  if (header === 'Diferencia (MPa)' && valor !== '' && parseFloat(valor) <= 0) {{
                                      td.classList.add('red-negative');
                                  }}

                                  // Colorear con fondo verde claro columnas específicas
                                  const columnasVerdes = ['Edad (días)', 'Resistencia nominal (MPa)', 'Resistencia (MPa)', 'Resistencia Teórica (MPa)'];
                                  if (columnasVerdes.includes(header)) {{
                                      td.classList.add('green-bg');
                                  }}

                                  tr.appendChild(td);
                              }});
                              tbody.appendChild(tr);
                          }});

                          tableSectionIncumplimientos.classList.add('active');
                      }}
                  }}

                  proyectoInputIncumplimientos.addEventListener('input', function() {{
                      const valor = this.value.trim();

                      if (!valor || !proyectosIncumplimientos.includes(valor)) {{
                          tableSectionIncumplimientos.classList.remove('active');
                          filtersRowIncumplimientos.style.display = 'none';
                          return;
                      }}

                      datosFiltradosIncumplimientos = datosIncumplimientos.filter(row => row['Proyecto'] === valor);

                      selectorCilindroIncumplimientos.value = '';
                      selectorLocalizacionIncumplimientos.value = '';
                      selectorTomaIncumplimientos.value = '';
                      selectorResistenciaNominalIncumplimientos.value = '';

                      const cilindros = [...new Set(datosFiltradosIncumplimientos.map(row => row['Cilindro N°']))].filter(c => c).sort();
                      const localizaciones = [...new Set(datosFiltradosIncumplimientos.map(row => row['Localización']))].filter(l => l).sort();
                      const tomas = [...new Set(datosFiltradosIncumplimientos.map(row => row['Toma']))].filter(t => t).sort();
                      const resistenciasNominales = [...new Set(datosFiltradosIncumplimientos.map(row => row['Resistencia nominal (MPa)']))].filter(r => r !== null && r !== undefined).sort((a,b) => a - b);

                      selectorCilindroIncumplimientos.innerHTML = '<option value="">-- Todos los cilindros --</option>';
                      cilindros.forEach(cilindro => {{
                          const option = document.createElement('option');
                          option.value = cilindro;
                          option.textContent = cilindro;
                          selectorCilindroIncumplimientos.appendChild(option);
                      }});

                      selectorLocalizacionIncumplimientos.innerHTML = '<option value="">-- Todas las localizaciones --</option>';
                      localizaciones.forEach(localizacion => {{
                          const option = document.createElement('option');
                          option.value = localizacion;
                          option.textContent = localizacion;
                          selectorLocalizacionIncumplimientos.appendChild(option);
                      }});

                      selectorTomaIncumplimientos.innerHTML = '<option value="">-- Todas las tomas --</option>';
                      tomas.forEach(toma => {{
                          const option = document.createElement('option');
                          option.value = toma;
                          option.textContent = toma;
                          selectorTomaIncumplimientos.appendChild(option);
                      }});

                      selectorResistenciaNominalIncumplimientos.innerHTML = '<option value="">-- Todas las resistencias --</option>';
                      resistenciasNominales.forEach(resistencia => {{
                          const option = document.createElement('option');
                          option.value = resistencia;
                          option.textContent = resistencia;
                          selectorResistenciaNominalIncumplimientos.appendChild(option);
                      }});

                      filtersRowIncumplimientos.style.opacity = '0';
                      filtersRowIncumplimientos.style.display = 'flex';
                      setTimeout(() => {{
                          filtersRowIncumplimientos.style.transition = 'opacity 1500ms ease-in-out';
                          filtersRowIncumplimientos.style.opacity = '1';
                      }}, 0);

                      generarTablaIncumplimientos(datosFiltradosIncumplimientos);
                  }});

                  selectorCilindroIncumplimientos.addEventListener('change', recalcularOpcionesIncumplimientos);
                  selectorLocalizacionIncumplimientos.addEventListener('change', recalcularOpcionesIncumplimientos);
                  selectorTomaIncumplimientos.addEventListener('change', recalcularOpcionesIncumplimientos);
                  selectorResistenciaNominalIncumplimientos.addEventListener('change', recalcularOpcionesIncumplimientos);

                  btnResetIncumplimientos.addEventListener('click', function() {{
                      proyectoInputIncumplimientos.value = '';
                      selectorCilindroIncumplimientos.value = '';
                      selectorLocalizacionIncumplimientos.value = '';
                      selectorTomaIncumplimientos.value = '';
                      selectorResistenciaNominalIncumplimientos.value = '';
                      filtersRowIncumplimientos.style.display = 'none';
                      tableSectionIncumplimientos.classList.remove('active');
                      proyectoInputIncumplimientos.focus();
                  }});

              </script>
          </body>
          </html>"""

          with open(archivo_html, 'w', encoding='utf-8') as f:
              f.write(html)
              f.write(f'\n<!-- Generated: {datetime.now().isoformat()} -->')

          print(f'[+] ✅ HTML generado: {archivo_html}')
          PYTHON_SCRIPT

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 🤖 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add index.html

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Generar Dashboard - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] ✓ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== DASHBOARD GENERADO ==="
          echo ""
          echo "📄 Archivo generado:"
          ls -lh index.html 2>/dev/null || echo "No hay archivo"
          echo ""
          echo "✅ Todas las 3 pestañas con filtros completadas"
