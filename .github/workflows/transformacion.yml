name: 📈 Transformación de Datos

on:
  workflow_dispatch:

jobs:
  transformar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install pandas openpyxl

      - name: 📈 Transformar datos SGS y Concrelab
        run: |
          python3 << 'PYEOF'
import pandas as pd
import os
from pathlib import Path
from openpyxl import load_workbook
from openpyxl.styles import PatternFill, Font

ruta_datos = "datos"
Path(ruta_datos).mkdir(exist_ok=True)

# Mapeo de columnas SGS
mapa_sgs = {
    'Código Obra': 'Proyecto',
    'OBRA': 'Proyecto',
    'Tipo Material': 'Material',
    'Edad': 'Días',
    'Resultado (MPa)': 'Resistencia_MPa',
    'Observaciones': 'Observaciones'
}

# Mapeo de columnas Concrelab
mapa_concrelab = {
    'Proyecto': 'Proyecto',
    'Material': 'Material',
    'Días': 'Días',
    'Resistencia': 'Resistencia_MPa',
    'Notas': 'Observaciones'
}

archivos_sgs = [f for f in os.listdir(ruta_datos) if f.startswith('reporte_sgs_') and f.endswith('.xlsx')]
print(f'[*] Transformando {len(archivos_sgs)} archivo(s) SGS')

for archivo in archivos_sgs:
    try:
        ruta = os.path.join(ruta_datos, archivo)
        df = pd.read_excel(ruta)
        
        # Renombrar columnas
        columnas_nuevas = {}
        for col_antigua, col_nueva in mapa_sgs.items():
            if col_antigua in df.columns:
                columnas_nuevas[col_antigua] = col_nueva
        df.rename(columns=columnas_nuevas, inplace=True)
        
        # Formato de encabezados azul
        df.to_excel(ruta, index=False)
        wb = load_workbook(ruta)
        ws = wb.active
        azul = PatternFill(start_color="1F4788", end_color="1F4788", fill_type="solid")
        blanco = Font(color="FFFFFF", bold=True)
        for col in range(1, ws.max_column + 1):
            ws.cell(1, col).fill = azul
            ws.cell(1, col).font = blanco
        wb.save(ruta)
        print(f'[+] ✅ Transformado: {archivo}')
    except Exception as e:
        print(f'[!] Error transformando {archivo}: {str(e)}')

archivos_concrelab = [f for f in os.listdir(ruta_datos) if f.startswith('reporte_concrelab_') and f.endswith('.xlsx')]
print(f'[*] Transformando {len(archivos_concrelab)} archivo(s) Concrelab')

for archivo in archivos_concrelab:
    try:
        ruta = os.path.join(ruta_datos, archivo)
        df = pd.read_excel(ruta)
        
        # Renombrar columnas
        columnas_nuevas = {}
        for col_antigua, col_nueva in mapa_concrelab.items():
            if col_antigua in df.columns:
                columnas_nuevas[col_antigua] = col_nueva
        df.rename(columns=columnas_nuevas, inplace=True)
        
        # Formato de encabezados azul
        df.to_excel(ruta, index=False)
        wb = load_workbook(ruta)
        ws = wb.active
        azul = PatternFill(start_color="1F4788", end_color="1F4788", fill_type="solid")
        blanco = Font(color="FFFFFF", bold=True)
        for col in range(1, ws.max_column + 1):
            ws.cell(1, col).fill = azul
            ws.cell(1, col).font = blanco
        wb.save(ruta)
        print(f'[+] ✅ Transformado: {archivo}')
    except Exception as e:
        print(f'[!] Error transformando {archivo}: {str(e)}')

print('[+] ✅ Transformación completada')
PYEOF

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 📤 Commit y Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git add datos/
          if git diff --quiet --cached; then
            echo "[*] Sin cambios"
          else
            git commit -m "[AUTO] Transformación de datos - $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
            echo "[+] Push completado"
          fi
