name: 📊 Descarga Diaria Concrelab

on:
  workflow_dispatch:

jobs:
  descargar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: ⬇️ Descargar Excel de Concrelab (FLORA y TERRA)
        env:
          CONCRELAB_FLORA_USER: ${{ secrets.CONCRELAB_FLORA_USER }}
          CONCRELAB_FLORA_PASS: ${{ secrets.CONCRELAB_FLORA_PASS }}
          CONCRELAB_TERRA_USER: ${{ secrets.CONCRELAB_TERRA_USER }}
          CONCRELAB_TERRA_PASS: ${{ secrets.CONCRELAB_TERRA_PASS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python << 'EOF'
          import asyncio
          from playwright.async_api import async_playwright
          import os
          from pathlib import Path

          # Lista de proyectos
          proyectos = ['FLORA', 'TERRA']

          # Crear carpeta datos si no existe
          Path('datos').mkdir(exist_ok=True)

          async def descargar():
              print('[*] Iniciando descarga Concrelab - Múltiples proyectos')
              print(f'[*] Proyectos a descargar: {", ".join(proyectos)}')

              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)

                  # Iterar sobre cada proyecto
                  for proyecto in proyectos:
                      print(f'\n[*] ========== DESCARGANDO: {proyecto} ==========')

                      email = os.getenv(f'CONCRELAB_{proyecto}_USER')
                      password = os.getenv(f'CONCRELAB_{proyecto}_PASS')

                      if not email or not password:
                          print(f'[!] ERROR: Credenciales no encontradas para {proyecto}')
                          continue

                      page = await browser.new_page()

                      try:
                          # Login
                          await page.goto('https://clientes.concrelab.com.co/login', timeout=30000)
                          await page.locator('input').nth(0).fill(email)
                          await page.locator('input').nth(1).fill(password)
                          await page.locator('button').click()
                          await page.wait_for_timeout(5000)
                          print(f'[+] ✅ Login exitoso - {proyecto}')

                          # Navegar a Data Muestras
                          await page.get_by_text('Concretos').click()
                          await page.get_by_text('Data Muestras').click()
                          await page.wait_for_timeout(1000)
                          print(f'[+] ✅ En Data Muestras - {proyecto}')

                          # Seleccionar opción en dropdown
                          await page.locator('div.css-1q5wwa7').click()
                          await page.wait_for_timeout(1000)
                          await page.locator('[role="option"]').last.click()
                          await page.wait_for_timeout(2000)
                          print(f'[+] ✅ Opción seleccionada - {proyecto}')

                          # Esperar a que la página se cargue completamente
                          await page.wait_for_load_state('networkidle', timeout=20000)
                          await page.wait_for_timeout(2000)
                          print(f'[+] Esperando a que aparezca el botón - {proyecto}...')

                          # Intentar múltiples selectores para encontrar el botón (Mas o More)
                          selectors = [
                              'button[title="More"]',
                              'button[title="Mas"]',
                              'button[aria-label*="More"]',
                              'button[aria-label*="Mas"]',
                              'button:has-text("More")',
                              'button:has-text("Mas")',
                              'button[class*="more"]',
                              'button[class*="mas"]'
                          ]

                          boton_encontrado = False
                          for selector in selectors:
                              try:
                                  elemento = page.locator(selector)
                                  if await elemento.is_visible(timeout=5000):
                                      await elemento.click()
                                      await page.wait_for_timeout(1000)
                                      print(f'[+] ✅ Botón encontrado con selector: {selector} - {proyecto}')
                                      boton_encontrado = True
                                      break
                              except:
                                  continue

                          if not boton_encontrado:
                              print(f'[!] Error: No se encontró el botón More/Mas para {proyecto}')
                              continue

                          # Capturar descarga con reintentos
                          for intento in range(1, 4):
                              try:
                                  async with page.expect_download(timeout=20000) as download_info:
                                      await page.get_by_text('Exportar a Excel').click()

                                  download = await download_info.value
                                  filepath = f'datos/reporte_concrelab_{proyecto}.xlsx'
                                  await download.save_as(filepath)
                                  print(f'[+] ✅ Descargado: {filepath}')
                                  break
                              except Exception as e:
                                  if intento < 3:
                                      print(f'[!] Intento {intento} falló, reintentando... - {proyecto}')
                                  else:
                                      print(f'[!] Falló después de 3 intentos para {proyecto}')
                                  await page.wait_for_timeout(2000 * intento)

                      except Exception as e:
                          print(f'[!] ERROR en {proyecto}: {str(e)}')
                      finally:
                          await page.close()

                  await browser.close()
                  print('\n[+] ✅ Descarga Concrelab completada para todos los proyectos')

          asyncio.run(descargar())
          EOF

      - name: 📦 Instalar pandas y openpyxl
        run: |
          pip install pandas openpyxl

      - name: 📈 Transformar y Formatear Concrelab
        run: |
          python << 'EOF'
          import pandas as pd
          import os
          from openpyxl import load_workbook
          from openpyxl.styles import PatternFill, Font
          from pathlib import Path

          ruta_datos = "datos"

          # Obtener archivos Concrelab
          archivos_concrelab = [f for f in os.listdir(ruta_datos) if f.startswith('reporte_concrelab_') and f.endswith('.xlsx')]
          print(f'[*] Transformando {len(archivos_concrelab)} archivo(s) Concrelab')

          for archivo in archivos_concrelab:
              ruta_origen = os.path.join(ruta_datos, archivo)
              print(f'\n[*] Procesando: {archivo}')

              # Cargar Excel desde fila 4 (skiprows=3)
              df = pd.read_excel(ruta_origen, skiprows=3)
              print(f'[+] Datos cargados. Forma: {df.shape}')

              # Columnas a mantener (nombres exactos de Concrelab)
              columnas_mantener = [
                  'Proyecto',
                  'Cilindro N°',
                  'Código de mezcla',
                  'Localización',
                  'Toma',
                  'Rotura',
                  'Edad (días)',
                  'Resistencia nominal (MPa)',
                  'Resistencia (MPa)',
                  'Resistencia (%)'
              ]

              df = df[columnas_mantener]
              print(f'[+] Columnas filtradas')

              # Renombrar para estandarizar (para uso interno)
              df = df.rename(columns={'Cilindro N°': 'Cilindro Nº'})
              print(f'[+] Columnas estandarizadas')

              # Agregar columna TIPO según Localización
              def obtener_tipo(localizacion):
                  if pd.isna(localizacion):
                      return None
                  localizacion_upper = str(localizacion).upper()
                  if "MURO" in localizacion_upper:
                      return "MURO"
                  elif "PLACA" in localizacion_upper:
                      return "PLACA"
                  elif "AUTOCOMPACTABLE" in localizacion_upper:
                      return "AUTOCOMPACTABLE"
                  elif "TREMIE" in localizacion_upper:
                      return "TREMIE"
                  return None

              df['TIPO'] = df['Localización'].apply(obtener_tipo)
              print(f'[+] Columna TIPO agregada')

              # Calcular promedio por grupo
              df['Resistencia Promedio (MPa)'] = df.groupby(['Proyecto', 'Cilindro Nº', 'Edad (días)'])['Resistencia (MPa)'].transform('mean')

              # Calcular conteo
              df['Conteo Elementos'] = df.groupby(['Proyecto', 'Cilindro Nº', 'Edad (días)'])['Resistencia (MPa)'].transform('count')

              # Renombrar y calcular porcentaje individual
              df = df.rename(columns={'Resistencia (MPa)': 'Resistencia (MPa) Individual'})
              df['Resistencia (%) Individual'] = (df['Resistencia (MPa) Individual'] / df['Resistencia nominal (MPa)']) * 100

              # Redondear a 3 decimales
              columnas_numericas = ['Edad (días)', 'Resistencia nominal (MPa)', 'Resistencia (MPa) Individual', 'Resistencia (%) Individual', 'Resistencia Promedio (MPa)', 'Resistencia (%)']
              df[columnas_numericas] = df[columnas_numericas].round(3)
              print(f'[+] Datos redondeados a 3 decimales')

              # Ordenar por Edad y Resistencia nominal (descendente)
              df = df.sort_values(['Edad (días)', 'Resistencia nominal (MPa)'], ascending=[False, False]).reset_index(drop=True)
              print(f'[+] Datos ordenados')

              # Guardar transformado
              df.to_excel(ruta_origen, index=False)
              print(f'[+] Datos guardados')

              # Aplicar formato
              wb = load_workbook(ruta_origen)
              ws = wb.active

              col_promedio = df.columns.get_loc('Resistencia Promedio (MPa)') + 1
              col_individual = df.columns.get_loc('Resistencia (MPa) Individual') + 1
              col_individual_pct = df.columns.get_loc('Resistencia (%) Individual') + 1
              col_conteo = df.columns.get_loc('Conteo Elementos') + 1

              columnas_verde_claro = ['Resistencia (%)', 'Proyecto', 'TIPO', 'Cilindro Nº', 'Código de mezcla', 'Localización', 'Toma', 'Rotura', 'Edad (días)', 'Resistencia nominal (MPa)']
              col_verde_claro_idx = [df.columns.get_loc(col) + 1 for col in columnas_verde_claro if col in df.columns]

              # Colores
              verde = PatternFill(start_color="00B050", end_color="00B050", fill_type="solid")
              azul_claro = PatternFill(start_color="ADD8E6", end_color="ADD8E6", fill_type="solid")
              verde_claro = PatternFill(start_color="90EE90", end_color="90EE90", fill_type="solid")
              azul_militar = PatternFill(start_color="1F4788", end_color="1F4788", fill_type="solid")
              blanco = Font(color="FFFFFF")

              # Colorear filas
              for row in range(2, ws.max_row + 1):
                  for col_idx in range(1, ws.max_column + 1):
                      celda = ws.cell(row, col_idx)

                      if col_idx in col_verde_claro_idx:
                          celda.fill = verde_claro
                      elif col_idx in [col_individual, col_individual_pct, col_conteo]:
                          celda.fill = azul_claro
                      elif col_idx == col_promedio:
                          valor = ws.cell(row, col_promedio).value
                          if valor is not None:
                              celda.fill = verde if valor >= 0 else PatternFill(start_color="FF0000", end_color="FF0000", fill_type="solid")

                  # Formato porcentaje
                  celda_pct = ws.cell(row, col_individual_pct)
                  celda_pct.number_format = '0.00"%"'

              # Colorear encabezados
              for col_idx in range(1, ws.max_column + 1):
                  celda_header = ws.cell(1, col_idx)
                  celda_header.fill = azul_militar
                  celda_header.font = blanco

              wb.save(ruta_origen)
              print(f'[+] ✓ Formato aplicado')

          print(f'\n[+] ✓ Transformación Concrelab completada')

          EOF

      - name: 📊 Crear Excel Consolidado en desplegable
        run: |
          python << 'EOF'
          import pandas as pd
          import os
          from openpyxl import load_workbook
          from openpyxl.styles import PatternFill, Font
          from pathlib import Path

          ruta_datos = "datos"
          ruta_desplegable = "desplegable"

          # Crear carpeta desplegable si no existe
          Path(ruta_desplegable).mkdir(exist_ok=True)

          # Obtener todos los archivos Excel
          print(f'[*] Buscando archivos en: {ruta_datos}')
          archivos_excel = [f for f in os.listdir(ruta_datos) if f.endswith('.xlsx')]
          print(f'[*] Archivos encontrados: {archivos_excel}')
          print(f'[*] Consolidando {len(archivos_excel)} archivo(s)')

          # Leer y combinar todos los archivos
          lista_dataframes = []

          for archivo in archivos_excel:
              ruta_origen = os.path.join(ruta_datos, archivo)
              print(f'[+] Leyendo: {archivo}')
              df = pd.read_excel(ruta_origen)
              lista_dataframes.append(df)

          if lista_dataframes:
              # Consolidar todos los datos
              df_consolidado = pd.concat(lista_dataframes, ignore_index=True)
              print(f'[+] Consolidado creado. Forma: {df_consolidado.shape}')

              # Guardar consolidado en desplegable (sin formato para mayor velocidad)
              ruta_consolidado = os.path.join(ruta_desplegable, 'ConsolidadoResistencias.xlsx')
              df_consolidado.to_excel(ruta_consolidado, index=False)
              print(f'[+] Consolidado guardado en: {ruta_consolidado}')

              # Formateo rápido: solo encabezados
              print(f'[+] Aplicando formato rápido (encabezados)')

              wb = load_workbook(ruta_consolidado)
              ws = wb.active

              # Colores
              azul_militar = PatternFill(start_color="1F4788", end_color="1F4788", fill_type="solid")
              blanco = Font(color="FFFFFF", bold=True)

              # Colorear solo encabezados (mucho más rápido)
              for col_idx in range(1, ws.max_column + 1):
                  celda_header = ws.cell(1, col_idx)
                  celda_header.fill = azul_militar
                  celda_header.font = blanco

              wb.save(ruta_consolidado)
              print(f'[+] ✓ Consolidado guardado rápidamente')
          else:
              print(f'[!] No hay archivos para consolidar')

          EOF

      - name: 📄 Crear index.html con visualización
        run: |
          python << 'EOF'
          import pandas as pd
          import os
          from pathlib import Path
          from datetime import datetime

          ruta_desplegable = "desplegable"
          ruta_consolidado = os.path.join(ruta_desplegable, 'ConsolidadoResistencias.xlsx')

          print(f'[*] Generando index.html')

          # Leer el consolidado
          df = pd.read_excel(ruta_consolidado)
          print(f'[+] Datos leídos: {len(df)} filas')

          # Crear HTML
          html_content = f'''<!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Consolidado de Resistencias - Concretos</title>
              <style>
                  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                  body {{
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      padding: 20px;
                      min-height: 100vh;
                  }}
                  .container {{
                      max-width: 1400px;
                      margin: 0 auto;
                      background: white;
                      border-radius: 10px;
                      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                      padding: 30px;
                  }}
                  h1 {{
                      color: #1F4788;
                      margin-bottom: 10px;
                      text-align: center;
                  }}
                  .info {{
                      text-align: center;
                      color: #666;
                      margin-bottom: 30px;
                      font-size: 14px;
                  }}
                  .stats {{
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                      gap: 20px;
                      margin-bottom: 30px;
                  }}
                  .stat-box {{
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      padding: 20px;
                      border-radius: 8px;
                      text-align: center;
                  }}
                  .stat-box .number {{
                      font-size: 32px;
                      font-weight: bold;
                      margin: 10px 0;
                  }}
                  .stat-box .label {{
                      font-size: 12px;
                      opacity: 0.9;
                  }}
                  table {{
                      width: 100%;
                      border-collapse: collapse;
                      margin-top: 20px;
                      font-size: 13px;
                  }}
                  thead {{
                      background: #1F4788;
                      color: white;
                  }}
                  th {{
                      padding: 15px;
                      text-align: left;
                      font-weight: 600;
                  }}
                  td {{
                      padding: 12px 15px;
                      border-bottom: 1px solid #eee;
                  }}
                  tbody tr:hover {{
                      background: #f5f5f5;
                  }}
                  tbody tr:nth-child(even) {{
                      background: #f9f9f9;
                  }}
                  .col-verde {{ background: #90EE90; }}
                  .col-azul {{ background: #ADD8E6; }}
                  .col-verde-oscuro {{ background: #00B050; color: white; }}
                  .footer {{
                      text-align: center;
                      margin-top: 40px;
                      padding-top: 20px;
                      border-top: 1px solid #eee;
                      color: #999;
                      font-size: 12px;
                  }}
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>📊 Consolidado de Resistencias - Concretos</h1>
                  <div class="info">
                      <p>Generado: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}</p>
                      <p>Total de registros: {len(df):,}</p>
                  </div>

                  <div class="stats">
                      <div class="stat-box">
                          <div class="label">Total Registros</div>
                          <div class="number">{len(df):,}</div>
                      </div>
                      <div class="stat-box">
                          <div class="label">Proyectos</div>
                          <div class="number">{df['Proyecto'].nunique()}</div>
                      </div>
                      <div class="stat-box">
                          <div class="label">Localizaciones</div>
                          <div class="number">{df['Localización'].nunique()}</div>
                      </div>
                      <div class="stat-box">
                          <div class="label">Resistencias Nominales</div>
                          <div class="number">{df['Resistencia nominal (MPa)'].nunique()}</div>
                      </div>
                  </div>

                  <table>
                      <thead>
                          <tr>
                              {f"".join(f"<th>{col}</th>" for col in df.columns)}
                          </tr>
                      </thead>
                      <tbody>
                          {f"".join(f"<tr>{''.join(f'<td>{str(val)[:50]}</td>' for val in row)}</tr>" for _, row in df.head(500).iterrows())}
                      </tbody>
                  </table>

                  <div class="footer">
                      <p>📥 Fuente: Descarga automática de SGS y Concrelab</p>
                      <p>🔄 Actualizado automáticamente según cronograma</p>
                  </div>
              </div>
          </body>
          </html>
          '''

          # Guardar HTML
          ruta_html = os.path.join(ruta_desplegable, 'index.html')
          with open(ruta_html, 'w', encoding='utf-8') as f:
              f.write(html_content)

          print(f'[+] ✓ index.html generado en: {ruta_html}')

          EOF

      - name: 🔧 Configurar Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action Bot"

      - name: 📤 Hacer commit y push
        run: |
          git add datos/

          if git diff --quiet --cached; then
            echo "[*] Sin cambios nuevos"
          else
            git commit -m "[AUTO] Descarga Concrelab - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "[+] ✅ Push completado"
          fi

      - name: 📊 Reporte final
        if: always()
        run: |
          echo "=== RESULTADO FINAL ==="
          echo "Archivos en datos/:"
          ls -lh datos/ 2>/dev/null || echo "No hay archivos aún"
          echo ""
          echo "Últimos commits:"
          git log --oneline -3
